##### Government Reforms #####
aba_pol_catholic_henrician_articles: "Henrician Articles"
aba_pol_catholic_henrician_articles_desc: "With the growing bureaucracy and the increasing complexity of our government, it is essential that we establish a clear set of rules and guidelines for the governance of our nation, as well as our obligations to both the people and the nobility who have supported our campaigns against pagans and squabbling princes alike. The Henrician Articles will serve as a constitution for our nation, brokered by our Frankish advisor and noblemen Henry De Valois, outlining the rights and responsibilities of our subjects and the Szlachta, as well as the powers, limitations, and the reciprocatory obligations of the Monarch. No King shall have the right to govern without the consent of the Szlachta, and no King shall have the right to raise taxes without the consent of the Sejm. The Henrician Articles will ensure that our nation is governed in a fair and just manner, and that the rights of our subjects are protected."
unlock_aba_pol_catholic_henrician_articles_tt: "§GUnlocks§! the §YHenirican Articles§! §MTier 3§! Government Reform, giving the following effects:\n\n§G+3§! Max Promoted Cultures\n§R+5.0%§! All Estates Influence Modifier\n§G+5.0%§! All Estates Influence Loyalty Equilibirum Modifier\n§G+15.0%§! Reform Progress Growth\n\nThis reform also includes the following government mechanic:\nCalling the Diet no longer increases influence."
aba_pol_catholic_republic_of_three_nations_reform: "Prometheism"
aba_pol_catholic_republic_of_three_nations_reform_desc: "Just as Prometheus had gifted fire to mankind in defiance of Zeus, so have we bestowed the East, moreover than that the World, with the gift of emancipation from the tyranny of lesser men. Whether it was the depostic princes of Rus' and their maintance of Serfdom, the soul sucking tendrils of the Mongol hordes that exacted tribute from mere peasants, or the godless heathens of the Baltic who only knew a taste for blood and battle, we have overcome these existenial threats to our desire for freedom and our respect for individual sovereignty. Rather than impose our will upon these newly liberated peoples, we nutured their disctinct cultural identities and traditions, and found ourselves reborn as a new nation, whose principles and enlightened ideals transcended all religious, ethnic, and political barriers as well as attempts at political domination of this great expirment by one man, group, or factional interest. We are not greater than the sum of our parts, and as absolutists grow in power across the world, and false prophets of liberty raise their banners, we must show the world the strength we have found in unity. "
unlock_aba_pol_catholic_republic_of_three_nations_reform_tt: "§GUnlocks§! the §YPrometheism§! §MTier 11§! Government Reform, giving the following effects:\n\n§G+5.0%§! Adminstrative Efficiency\n§G-15.0%§! State Governing Cost\n§G-15.0%§! Province Warscore Cost\n§R-30.0§! Max Absolutism\n§R+10.00§! Minimum Autonomy in Territories.\n\nThis reform also includes the following government mechanics:\nCan §YRecruit§! Foreign Generals.\nGains §YManpower§! from Defeating Enemy Armies."
aba_pol_catholic_husaria_buffed: "Perfect the Husaria"
aba_pol_catholic_husaria_buffed_desc: "The Winged Hussars are a heavy cavalry forces which form the most elite unit of our armies, and even though we have taken steps to equip them with firearms and vast array of the latest technological innovations, there is still potential to expand their role on the battlefield. We must invest in the further expansion of the Hussar Regiments, further integrate them into our standing armies."
unlock_aba_pol_catholic_husaria_buffed_tt: "§GUnlocks§! an empowered version of the §YReform the Husaria§! §MTier 4§! Government Reform, giving the following effects:\n\n§G+12.0§! Possible Winged Hussars\n§G+50.0%§! Cavalry to Infantry Ratio\n\nThis reform also includes the following government mechanics:\nOverruning enemy armies now grants §G+0.1§! bonus Army Tradition."
aba_pol_catholic_commonwealth_of_crowns: "Commonwealth of Crowns"
aba_pol_catholic_commonwealth_of_crowns_desc: "With our conquest of the East, we had two choices. To forcibly impose our rule, culture, and customs upon these poor people who have only ever seen despotism and endless wars. Or take them down a one path, one of enlightened rule, tolerance, understanding, and cross-cultural communcation. Our mixed heritage as union divided by the battling influences of the Slavic, Ruthenian, and Latin worlds, punctuated by the collapse of Mieszko's united Kingdom under these pressures only worked to reinforce that cosmpolitian vision in the minds of rulers and nobility. Our conquests were never about domination, but about liberation and unity, unity under the ideas of collective sovereignty, mutual respect, and freedom of the unjust forces of our cruel and divided world—a vision we would not be able to accomplish alone, if it weren't for the unique political, economic, and military contributions of the three main crowns that make up our federation. The passage of the Union of Lublin marks a new, more equal era for all people of the Intermarine Commonwealth, combining the best aspects of our diverse society to forge a mighty empire."
unlock_aba_pol_catholic_commonwealth_of_crowns_tt: "§GUnlocks§! the §YCommonwealth of Crowns§! §MTier 1§! Government Reform, giving the following effects:\n\n§G-2.00§! National Unrest\n§G-0.05§! Monthly Autonomy Change\n§G+1§! Possible Policies\n§G+350§! Governing Capacity\nNo §YStability§! Loss On Monarch Death\n§G+25.0%§! Parliament Debate Backing Chance\nCan §YRecruit§! Streltsy\n\nThis reform also includes the following government mechanics:\nEnables §YPopular Sovereignty§! Ability\nCan §YClaim§! Enitre States"
aba_crownpoland: "Crown of Poland"
aba_crownpoland_desc: "After the death of our first and until now, the only king Mieszko I, the Polish state had fragmented into smaller duchies led by the local rulers. After centuries of division, we have finally managed to reunite our nation under a single crown and so, our homeland shall stand united until the end of the days!"

#### GOVERNMENT MECHANICS #####
ability_commonwealth_mechanic: "Popular Sovereignty"
commonwealth_popular_sovereignity: "Popular Sovereignty"
commonwealth_popular_sovereignity_desc: "Popular Sovereignty is the governing principle of [Root.GetName], believing that the people, even more so than any powerful interest or social class, are the source of all political legitimacy, driving the tolerant and inclusive policies of our realm. With the ascension of every [Root.Monarch.GetTitle], faith in their ability to overcome the vested powers of the Szlachta, Magnates, and other influential groups remains doubtful, but as they continue to rule and prove themselves to truly be a severant of the people, the population's faith and cooperation snowballs into a nigh unstoppable force, manifesting as a populist fervor tantamount to the power wielded by absolutist rulers abroad. \n\n§YPopular Sovereignty§! can be earned by:\n - Increasing §YAutonomy§! (§G+0.01§!/month, per province)\n - Having §GLoyal§! §YEstates§! (§G+0.03§!/month per Estate, scaling when §YLoyalty§! is between §G60§!-§G100%§!)\n - Promoting new §YCultures§! (§G+3§!)\n\n§YPopular Sovereignty§! can be lost by:\n - Decreasing §YAutonomy§! (§R-0.01§!/month, per province)\n - Having §RDisloyal§! §YEstates§! (§R-0.03§!/month per Estate, scaling when §YLoyalty§! is between §R0%§!-§R29%§!)\n - Demoting accepted §YCultures§! (§R-3§!)"
monthly_commonwealth_popular_sovereignity: "Monthly Popular Sovereignty"
commonwealth_appoint_chancellor: "Appoint a Grand Chancellor of The Crown"
commonwealth_appoint_chancellor_desc: "With the reunification of the Kingdom of Poland and its subsequent political transformations, the role of the bureacracy has evolved and grown over time. The passage of the Henirican Articles and the institution of the Golden Liberty was not enough to ensure the survivial of our nation's unique and balanced system of governance. To ensure both the interests of the Szlachta and the [Root.Monarch.GetTitle] are represented fair and equitably in the pursuit of cultivating national unity and shared vision for the future of our nation, the Office of Grand Chancellor of the Crown has been created. Over time, this office, along with that of Vice-Chancellor, have grown in power and responsibility, guiding the foreign policy of the realm, ensuring the legality of our the [Root.Monarch.GetTitle]'s actions in respect of the Henirican Articles and established powers of the Sejm, while also acting as the [Root.Monarch.GetTitle]'s hand, eye, and ear—the translator of his thoughts and will to both our people, bureaucracy, and the world at large.  The choice will be confirmed by both the [Root.Monarch.GetTitle] and the Sejm, asserting the legitimacy of their office and affirming the powers both have vested in them.\n\n - Each choice of §YGrand Chancellor§! will provide §G+1§! £adm£ Monthly Adminstrative Power and unique §GModifiers§! based on their respective §YCulture§!.\n\n"
commonwealth_adm_power: "Appoint a Grand Chancellor of The Crown Progress"
ABA_POL_COMMONONWEALTH_CHANCELLOR_EVENT_YES: "£yes£ If §Y[Root.Monarch.GetName]§! has §Rnot§! chosen to appoint a §YGrand Chancellor§! yet, we will receive:\n"
ABA_POL_COMMONONWEALTH_CHANCELLOR_EVENT_NO: "£no£ If §Y[Root.Monarch.GetName]§! has §Rnot§! chosen to appoint a §YGrand Chancellor§! yet, we will receive:\n"
ABA_POL_COMMONWEALTH_CHANCELLOR_ADVISOR_TT: "Randomly Gain a skill §Y3§! Treasurer (National Tax Modifier: §G+10.0%§!), Statesman (Diplomatic Reputation: §G+1§!), or Diplomat (Improve Relations: §G20.0%§!) advisor. These advisors are §G67%§! cheaper for your country to employ."
commonwealth_cooperate_with_magnates: "Cooperate With The Magnates"
commonwealth_cooperate_with_magnates_desc: "Although the Szlachta operates within the confines of the Sejm and respects the pseudo-democratic nature of our society, their lie a social class that far outranks them in power and wealth: The Magnates, the higher nobility. Descending from the lineage of Lithuanian Grand Dukes, Ruthenian Princes, and the old noble families of Mieszko's United Kingdom, they control large estates, possess vast political influence on the provinical or even national level, and maintain powerful and well-trained private armies that have ensured the success of our various military campaigns. This in hand has turned members of the lesser nobility and the Sejm into treasonous sycophants that betray our national interests in favor of the patronage of the 'Little Kings'. Although some in our court seek to minizime their influence and crush them once and for all, this is simply not a possibility in the diverse and decentralized political framework of our nation. Instead the Grand Chancellor has suggested that we cooperate with certain Magnate families to pursue our national interests, playing into their petty rivalries through royal grants and direct patronage, causing them to inadvertly point their wealth and influence in support our goals.\n\n - Each choice of §YMagnate§! family will provide §G+1§! £dip£ Monthly Diplomatic Power and unique §GModifiers§! based on their respective §YCulture§!.\n\n"
commonwealth_dip_power: "Cooperate With The Magnates Progress"
ABA_POL_COMMONONWEALTH_MAGNATE_EVENT_YES: "£yes£ If §Y[Root.Monarch.GetName]§! has §Rnot§! chosen to cooperate with a §YMagnate§! family yet, we will receive:\n"
ABA_POL_COMMONONWEALTH_MAGNATE_EVENT_NO: "£no£ If §Y[Root.Monarch.GetName]§! has §Rnot§! chosen to cooperate with a §YMagnate§! family yet, we will receive:\n"
ABA_POL_COMMONWEALTH_ACCEPTED_CULTURES_MAGNATES: "Have accepted at least §Y1§! §YRuthenian§! culture in addition to the §YLithuanian§! or §YLitvin§! cultures"
ABA_POL_COMMONWEALTH_MAGNATE_ESTATE_INCREASE: "The §Y[Root.GetNobilityName]§!, §Y[Root.GetBurghersName]§!, and §Y[Root.GetCossacksName]§! gain §G5§! loyalty and §Y10§! influence for §Y20§! years."
ABA_POL_COMMONWEALTH_MAGNATE_POPULAR_SOVEREIGNTY_SCALING: "Gain §G1§! §YPopular Sovereignty§! per privilege given to any §YEstate§!, up to a maximium of §Y5§! any time the interaction is used."
commonwealth_appoint_new_grand_hetman: "Appoint a Grand Hetman"
commonwealth_appoint_new_grand_hetman_desc: "Hetmans are the highest ranking military officiers of our nation, second only to the King, representing the various constituent armies of the Crown, typically in commmand of our professional and mobilized armies during times of war or peace. While each Kingdom and Duchy that composes the Crown may have multiple Hetmans of various rank and commanding power, it is the Grand Crown Hetman that serves as our command-in-chief, overseeing a variety of aides and officiers that power our military apparatus and fuel of the advancement of its strategies, structure, and overall organization. The various unions that formed under our crown each have their own unique and effective military cultures and schools of thoughts, making the appointment of a Grand Crown Hetman from one of these realms of the utmost importance in determining the future of our armed forces.\n\n - Each choice of §YGrand Hetman§! will provide §G+1§! £mil£ Monthly Military Power and unique §GModifiers§! based on their respective §YCulture§!.\n\n"
commonwealth_mil_power: "Appoint a Grand Hetman Progress"
ABA_POL_COMMONONWEALTH_HETMAN_EVENT_YES: "£yes£ If §Y[Root.Monarch.GetName]§! has §Rnot§! chosen to appoint a §YGrand Hetman§! yet, we will receive:\n"
ABA_POL_COMMONONWEALTH_HETMAN_EVENT_NO: "£no£ If §Y[Root.Monarch.GetName]§! has §Rnot§! chosen to appoint a §YGrand Hetman§! yet, we will receive:\n"
ABA_POL_COMMONWEALTH_MIL_GENERAL_TT_1: "\nThe §YGeneral§! will have a guaranteed chance to randomly gain §G+1§! pip in §Y1§! of the following: §YShock§!, §YFire§!, §YManuever§!, or §YSiege§!"
ABA_POL_COMMONWEALTH_MIL_GENERAL_TT_2: "\nThe §YGeneral§! will have a guaranteed chance to randomly gain §G+2§! pips in §Y1§! of the following: §YShock§!, §YFire§!, §YManuever§!, or §YSiege§!"
ABA_POL_COMMONWEALTH_MIL_ADVISOR_BUFF: "Depending on the type of §YMilitary Advisor§! employed, we will gain a bonus modifier for §G20§! Years.\n\n§YArmy Reformer§!: §G+2.5%§! Morale Damage\n§YArmy Organizer§!: §G+10%§! National Manpower Modifier\n§YCommandant§! §G+2.5%§! Fire Damage\n§YGrand Captain§! §G+0.5§! Army Tradition\n§YMaster Recruiter§!: §G+5%§! Shock Damage\n§YMilitary Engineer§!: §G+5%§! Siege Ability\n§YQuartermaster§!: §G-25%§! Reinforce Cost"

#### Commonwealth Government Mechanics Events
aba_commonwealth_mechanic_events.1.t: "Appointment of a Grand Chancellor of The Crown"
aba_commonwealth_mechanic_events.1.d: "The [Root.Monarch.GetTitle] and the Sejm have convenved today to discuss the appointment of a Grand Chancellor of the Crowm. The many Magnate families, Cossack Hosts, Tribes, and members of the Szlachta have made their arguments clear and their opposition to the candidates heard. The Choice now ultimately lies in the hands in the hands of the [Root.Monarch.GetTitle], whose selection will be carried through this deadlock by the weight of his words and authority bestowed upon by our unique system of popular sovereignty."
aba_commonwealth_mechanic_events.1.a: "Appoint a §YPolish§! Chancellor"
aba_commonwealth_mechanic_events.1.b: "Appoint a §YRuthenian§! Chancellor"
aba_commonwealth_mechanic_events.1.c: "Appoint a §YLitvin§! Chancellor"
aba_commonwealth_mechanic_events.1.f: "Appoint a §YRussian§! Chancellor"
aba_commonwealth_mechanic_events.1.e: "Appoint a §YTatar§! Chancellor"
aba_commonwealth_mechanic_events.2.t: "Cooperation With The Magnates"
aba_commonwealth_mechanic_events.2.d: "The Magnates are constantly bickering and vying for power within our Realm, acting as 'Little Kings' in their struggle for political dominance amongst the Sejm and other institutions that govern our great nation. Instead of letting this factionalism tear us apart, The [Root.Monarch.GetTitle] has floated the idea of granting one of these families favor in our court, harnessing their vast wealth and political influence as a tool to promote unity and the pursuit of our national interests. Even within each of the Crowns, lies multiple families each with different skills and talents, as well as insidious political ambition. While granting positions and titles may grant them even more influence, they will become tireless servants of the State, willing to do anything to protect their newfound benefice from the claws of other large and powerful families. The question is, with their diverse heritages and claimed lineages, which family do we bestow our favor to?"
aba_commonwealth_mechanic_events.2.a: "Cooperate with The §YPolish§! Magnates"
aba_commonwealth_mechanic_events.2.b: "Cooperate with The §YRuthenian§! Magnates"
aba_commonwealth_mechanic_events.2.c: "Cooperate with The §YLitvin§! Magnates"
aba_commonwealth_mechanic_events.2.f: "Cooperate with The §YRussian§! Magnates"
aba_commonwealth_mechanic_events.2.e: "Cooperate with The §YTatar§! Magnates"
aba_commonwealth_mechanic_events.3.t: "Appointment of a Grand Hetman"
aba_commonwealth_mechanic_events.3.d: "The appointment of a Grand Hetman is tantamount to the military success and survival of our nation, as they are highest ranking military officier, second only to The [Root.Monarch.GetTitle], acting as the Commander-in-Chief of The Crown's combined miltiary forces. Each Crown constituency has produced a number of talented Field Hetmans, each proving their martial prowess many times over in various campaigns against Pagans, Princes, Hordes, and The Absolutist Threat. With the ascension of a new [Root.Monarch.GetTitle], it has come time to select one of these Field Hetmans as the supreme leader of our armed forces, bring their own school of thought and military reform along with them. This decision should not be taken lightly, as the fate of our future military campaigns lies in their hands."
aba_commonwealth_mechanic_events.3.a: "The §YPolish§! Hetman's idea of a profesisonal army wins out!"
aba_commonwealth_mechanic_events.3.b: "The §YRuthenian§! Hetman would bolster our ties with the Cossacks!"
aba_commonwealth_mechanic_events.3.c: "The §YLitvin§! Hetman and their fierce warrior spirit will guide us to victory!"
aba_commonwealth_mechanic_events.3.f: "The §YRussian§! Hetman will overwhelm our enemies through mass assault!"
aba_commonwealth_mechanic_events.3.e: "The §YTatar§! Hetman swift and cunning tactics will outwit our foes!"

#### Estates ####
estate_burghers_pln_freedom_of_religion: "Religious Freedom"
ABA_estate_burghers_PLN_FREEDDOM_OF_RELIGION: "Religious Freedom"
ABA_estate_burghers_PLN_FREEDDOM_OF_RELIGION_desc: "Our new edict of religious freedom has been met with great enthusiasm by the people of our nation, and it has become a cornerstone of our society. By ensuring that all religions are treated equally, we have created a more just and equitable society, while also fostering a sense of unity and cooperation among the different religious groups within our nation. This has helped to ensure that our nation remains strong and prosperous, while also maintaining the support and loyalty of our diverse population."
ABA_UNLOCK_FREEDOM_OF_RELIGION_ESTATE_PRIVILEGE: "§GUnlocks§! the '§YReligious Freedom§!' [Root.GetBurghersName] Estate Privilege, giving the following effects:\n§G-100%§! Local Religious Unity Contribution in all §YHeretic§! and §YHeathen§! provinces.\n§R-100%§! Local Missionary Strength in all §YHeretic§! and §YHeathen§! provinces.\n§G+10.0%§! Local Tax Modifier in all §YHeretic§! and §YHeathen§! provinces.\n§G+10.0%§! Local Manpower Modifier in all §YHeretic§! and §YHeathen§! provinces.\n§G+10.0%§! Local Production Efficiency in all §YHeretic§! and §YHeathen§! provinces."
unlocked_privilege_estate_burghers_pln_freedom_of_religion_tt: "Has completed the 'Freedom of Religion' Mission."
estate_burghers_pln_freedom_of_religion_gt: "§G-100%§! Local Religious Unity Contribution in all §YHeretic§! and §YHeathen§! provinces.\n§R-100%§! Local Missionary Strength in all §YHeretic§! and §YHeathen§! provinces.\n§G+10.0%§! Local Tax Modifier in all §YHeretic§! and §YHeathen§! provinces.\n§G+10.0%§! Local Manpower Modifier in all §YHeretic§! and §YHeathen§! provinces.\n§G+10.0%§! Local Production Efficiency in all §YHeretic§! and §YHeathen§! provinces."
