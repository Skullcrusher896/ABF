unlocked_privilege_estate_nobles_golden_liberty_tt: "Has completed the 'The Golden Liberty' Mission."
unlock_privilege_estate_nobles_golden_liberty_tt: "§GUnlocks§! the '§YGolden Liberty§!' [Root.GetNobilityName] Estate Privilege, giving the following effects:\n§G+33.0%§! National Manpower Modifier\n§R-15.0§! Max Absolutism\n§R+10.0%§! [Root.GetNobilityName] Influence\n§G+5.0%§! [Root.GetNobilityName] Loyalty."
ABA_estate_cossacks_pln_cossack_szlachta: "Cossack Szlachta"
ABA_estate_cossacks_pln_cossack_szlachta_desc: "The Cossack Szlachta represent a unique class of nobility within our nation, combining the martial traditions of the Cossacks with the political influence of the Szlachta. This privilege grants them special rights and protections, ensuring their loyalty and commitment to our realm."
ABA_UNLOCK_COSSACK_SZLACHTA: "§GUnlocks§! the '§YCossack Szlachta§!' [Root.GetCossacksName] Estate Privilege, giving the following effects:\n§G+0.25§! Yearly Army Tradition\n§G-1.0%§! Yearly Army Tradition Decay\n§G+10.0%§! Cossack Allowed Force limit Fraction."
unlocked_privilege_estate_cossacks_pln_cossack_szlachta_tt: "Has completed the 'Cossack Szlachta' Mission."
estate_nobles_pln_enforced_serfdom: "Serfdom Enforced"
ABA_estate_nobles_POL_serdom_enforced: "Serfdom Enforced"
ABA_estate_nobles_POL_serdom_enforced_desc: "Not wishing to upset the status quo with the many powerful Magnate Families and the growing power of the Szlachta, we have chosen to enforce the institution of Serfdom. While once prominment in our Poland proper it had faded vast with reunification of the Kingdom, but our expansion into the lands of the East revealed the system was still heavily entrenched in the culture and rule of Ruthenia and the Steppe. by cooperating with these newly integrated noble families and preserving the system, we can ensure our rule remains unchallenged by uppity peasants and disatisfied nobles, strengthen our grip over the grain trade, and further centralize power in the hands of the [Root.Monarch.GetTitle]."
ABA_POL_UNLOCK_SERFDOM_ENFORCED_ESTATE_PRIVILEGE: "§GUnlocks§! the '§YInstitutionalized Serdom§!' [Root.GetNobilityName] Estate Privilege, giving the following effects:\n\nGlobal Effects:\n§G+1§! Yearly Absolutism.\n§G+50§! Max Absolutism.\n§G-0.05§! Monthly Autonomy Change.\n§R+5.0%§! Technology Cost.\n§R+5.0%§! Idea Cost.\n\nProvinical Effects:\n§G+1.00§! Local Goods Produced in all §YGrain§! and §YLivestock§! provinces.\n§G+10%§! Local Production Efficiency in all §YGrain§! and §YLivestock§! provinces.\n§G+25.0%§! Local Manpower Modifier in all §YGrain§! and §YLivestock§! provinces.\n§R+3§! Local Unrest in all §YGrain§! and §YLivestock§! provinces.\n§R-25.0%§! Local Institution Spread in all §YGrain§! and §YLivestock§! provinces.\n\nThese effects will apply in the §YRuthenia§!, §YRussia§!, §YPoland§!, and §YBaltic§! Regions.\n\n(§RThis is a locked privilege. You will not be able to revoke it due to the power that will be placed in the hands of the Szlachta.§!)"
unlocked_privilege_estate_nobles_pln_enforced_serfdom_tt: "Has completed the 'The Question of Serfdom' Mission."
estate_nobles_pln_enforced_serfdom_gt: "§G+1.00§! Local Goods Produced in all §YGrain§! and §YLivestock§! provinces.\n§G+10%§! Local Production Efficiency in all §YGrain§! and §YLivestock§! provinces.\n§G+25.0%§! Local Manpower Modifier in all §YGrain§! and §YLivestock§! provinces.\n§R+3§! Local Unrest in all §YGrain§! and §YLivestock§! provinces.\n§R-25.0%§! Local Institution Spread in all §YGrain§! and §YLivestock§! provinces in the §YRuthenia§!, §YRussia§!, §YPoland§!, and §YBaltic§! Regions."
estate_nobles_pln_enforced_serfdom_revoke: "'§YSerfdom Enforced§!' will be removed from every owned province in the §YRuthenia§!, §YRussia§!, §YPoland§!, and §YBaltic§! Regions."
estate_nobles_pln_serfdom_abolished: "Serfdom Abolished"
estate_nobles_pln_serfdom_abolished_artisans: "Blossoming Artisans"
estate_nobles_pln_serfdom_abolished_enlightenment: "The Paradox of Enlightenment"
ABA_estate_nobles_POL_serdom_abolished: "Abolition of Serfdom"
ABA_estate_nobles_POL_serdom_abolished_desc: "[Root.Monarch.GetTitle] was appaled by the institution of serfdom, shackling the people of the East to the land and the ever-growing power of the Szlachta. While the institution of Serfdom had largely not survived in the newly reunited Kingdom of Poland, it was a staple of Ruthenian and Steppe governance. But the people languished under it, while productive to a certain degree, the quality of work, the spread of ideas, and growth of a strong independent economic class that could challenge or upset the Szlachta was non-existent. Their cries for freedom and dream of liberty would only be realized under our enlightened rule. A cross-class alliance formed between the Zamoyski Magnate Family and the [Root.Monarch.GetTitle], creating a supermajority in the Sejm that quickly overruled any opposition, kicking off the start of a new socio-economic era for [Root.GetName]. Ideas began to flow freely as Serfs traveled and settled in new lands or cities. New guilds formed as highly skilled craftsmen were now allowed to openly sell their works for their rightful price, seeking common association with others to protect their newfound freedom. A new class in society began to emerge, one of merchants, artisans, intellecutals, and professionals who challenged the traditional role of Szlachta for their control of society. With Serfdom abolished, we have truly won over the hearts and minds of the people for centuries to come..."
ABA_POL_UNLOCK_SERFDOM_ABOLISHED_ESTATE_PRIVILEGE: "§GUnlocks§! the '§YAbolition of Serfdom§!' [Root.GetNobilityName] Estate Privilege, giving the following effects:\n\nGlobal Effects:\n\n§G+0.25§! Yearly Innovativeness.\n§G-2.50%§! Technology Cost.\n§G-2.50%§! Idea Cost.\n§R-15§! Max Absolutism.\n§R-0.5§! Yearly Absolutism.\n§R+0.05§! Monthly Autonomy Change.\n\nProvinical Effects:\n§G+0.25§! Local Goods Produced in all provinces that do not produce §YGrain§! and §YLivestock§!.\n§G+5.0%§! Local Production Efficiency in all provinces that do not produce §YGrain§! and §YLivestock§!.\n§G-3§! Local Unrest in all §YGrain§! and §YLivestock§! provinces.\n§G+25.0%§! Local Institution Spread in all §YGrain§! and §YLivestock§! provinces.\n§R-0.25§! Local Goods Produced in all §YGrain§! and §YLivestock§! provinces.\n§R+10.0§! Local Development Cost Modifier in all §YGrain§! and §YLivestock§! provinces.\n§R-10.0%§! Local Manpower Modifier in all §YGrain§! and §YLivestock§! provinces.\n\nThese effects will apply in the §YRuthenia§!, §YRussia§!, §YPoland§!, and §YBaltic§! Regions.\n\n(§RThis is a locked privilege. You will not be able to revoke it due to the freedom that has now been granted to a vast majority of the population.§!)"
unlocked_privilege_estate_nobles_pln_abolished_serfdom_tt: "Has completed the 'The Question of Serfdom' Mission."
estate_nobles_pln_abolished_serfdom_gt: "§G+0.25§! Local Goods Produced in all provinces that do not produce §YGrain§! and §YLivestock§!.\n§G+5.0%§! Local Production Efficiency in all provinces that do not produce §YGrain§! and §YLivestock§!.\n§G-3§! Local Unrest in all §YGrain§! and §YLivestock§! provinces.\n§G+25.0%§! Local Institution Spread in all §YGrain§! and §YLivestock§! provinces.\n§R-0.25§! Local Goods Produced in all §YGrain§! and §YLivestock§! provinces.\n§R+10.0§! Local Development Cost Modifier in all §YGrain§! and §YLivestock§! provinces.\n§R-10.0%§! Local Manpower Modifier in all §YGrain§! and §YLivestock§! provinces in the §YRuthenia§!, §YRussia§!, §YPoland§!, and §YBaltic§! Regions."
estate_nobles_pln_abolished_serfdom_revoke: "'§YBlossoming Artisans§!' and '§YThe Paradox of Enlightenment§!' will be removed from every owned province in the §YRuthenia§!, §YRussia§!, §YPoland§!, and §YBaltic§! Regions."
ABA_POL_QUESTION_OF_SERFDOM_SETTLED_TT: "'§YThe Question of Serfdom§!' has been §Rsettled§!, there is §Rno§! going back..."