l_english:
################################## Country Events ##################################
aba_pol_events.99.t: "The Founding of Krakow University"
aba_pol_events.99.d: "The city of Krakow has long been a center of culture and learning in our nation. However, it lacks a formal institution of higher education that can rival those found in other European countries. To address this, we have decided to establish a university in Krakow. This university will serve as a hub for intellectual and cultural exchange, attracting scholars and students from across Europe. It will also help to promote the Polish language and culture, which has been overshadowed by Latin and German in academic circles. The university will be modeled after the great universities of Bologna and Paris, with a focus on theology, law, medicine, and the arts. We will also establish a library and a printing press to facilitate the dissemination of knowledge. The founding of Krakow University is a significant step forward for our nation, and we are confident that it will help to elevate Poland's status as a center of learning and culture in Europe."
aba_pol_events.99.a: "A glorious day for culture and innovation!"
aba_pol_events.2.t: "Foreign Legion Regiments Arrive"
aba_pol_events.2.d: "Our reputation and martial prowess has attracted the attention of warriors from across the world. Many seek to join our cause, and fight for the ideals of freedom and liberty that we hold dear. To harness this potential, we have established the Foreign Legion, a mixed composition of regiments made up of volunteers from various nations. These regiments will serve as a powerful force for our nation, bringing with them unique skills and experiences that will enhance our military capabilities."
aba_pol_events.2.a: "Strength through Unity!"
aba_pol_events.3.t: "Fate of The Tatars"
aba_pol_events.3.d: "Having unified the people of the East in under our righetous banner, we marched further East, striking deep into the Heart of the Barbaric Mongol Horde, capturing their crown jewel: the City of Sarai. With their measely bureaucracy rapdily crumbling beneath our feet, and disunity sown amongst the tribes of the Horde, we find ourselves at a crossroads. The Ruthenians and Rusyans of our realm plead with the Sejm, the Szlachta, and even directly to the [Root.Monarch.GetTitle] to show no mercy against these uncivilized heathens, who once pillaged and sacked their once prosperous land. On the hand, we understand the plight of the Tatars, always on the road to war with no place to call home, no ruler or society that encourage them to be more than bloodthristy raiders. While the Ruthenians of Realm suggest we raze Sarai and settle the land with those already loyaly to the crown, many of the Cossacks of our Realm have found an suprisingly cultural syngergy with those who descend from the Steppe, encouraging their integration and enlightenment under our watchful eye. The question remains though, what is to be their fate?"
aba_pol_events.3.a: "They sealed their fate when they crossed the Urals!"
aba_pol_events.3.b: "Just as peace was brought to the East, so shall it be brought to the Steppe."
aba_pol_events.4.t: "Fusion of East and West"
aba_pol_events.4.d: "After long and arduous journey, we have arrived at a critical point in the integration of Rus', and the rest of the East for all that matter. The lines that once divided us, religiously, ethnically, linguistically, and politically are becoming increasingly blurred, as a mass cross-cultural exchange has occured between us Poles and the Ruthenians. As we took the best parts of their economic and political systems and integrated them into our, so too did they take what they wanted from us, with Latin and Polish becoming the common tongue among the elite, eeking its way into everyday life amongst the vast lands of Rus. They adopt our way of dress, our titles, customs and traditions, and fuse them with their own to create something entirely new, something that speaks to the spirit and ideals of our great nation. While we can preserve this new and unique cultural identity that came as a result of this fusion, and use this as lesson to be applied to other cultures brought into the fold, we are also teetering at the edge of full Polonization. While both options have their benefits and drawbacks, what we choose to do will inevitably define the way we interact and assimilate those we encounter as we push further East..."
aba_pol_events.4.a: "Polish influence will be the guiding light of our nation!"
aba_pol_events.4.b: "We find strength and unity in our collective sovereignty, we shall embrace our differences!"
aba_pol_events.5.t: "The Golden Liberty"
aba_pol_events.5.d: "The ascension ritual of the new [Root.Monarch.GetTitle] is a glorious and celebratory occasion, but one contentious part of this event is the [Root.Monarch.GetTitle]'s public confirmation and recongition of the Golden Liberty in front of the Sejm and assembled Szlachta from across the realm. To them, it is validation of their supremacy of the Crown, while to others it is an affirmattion of the democratic nature of our great state to our diverse array of subjects. But in reality, it is a double edged sword. It may give off an impression of a democratic process to our people, yet the real power remains in the hands of the scheming magnates and ever influential Szlachta. A cunning and diplomatic ruler may be able to outmanuver or manipulate these forces to push foward his agenda, but others in the past have to chosen to reject the Golden Liberty outright, and impose their will by force upon these powerful classes. The question is, what kind of legacy do we want to leave behind? Shall we acknowledge their time honored privileges and rights, and play the great game as our ancestors have done before? Or shall we take the left-hand path, and assert our divine right to rule?"
aba_pol_events.5.a: "We must respect the balance of power, we shall acknowledge the Golden Liberty"
aba_pol_events.5.b: "We draw the line here, we shall wrest control of the Golden Liberty!"
aba_pol_events.6.t: "The Union of Lublin -  A Meeting of the Many Peoples"
aba_pol_events.6.d: "A grand occasion has graced the streets of Lublin, as Szlachta, Cossacks, Tatar Chieftans, Ruthenian Clergymen, and myraid other classes of elite from across the realm gather in the city for a momentous meeting of the Sejm—a special constitution session. Well we may be a union in name, we act far from one. Much autonomy has been divided between the three crowns, operating on different legal, economic, and political frameworks, even though the Sejm has issued laws and decrees to bring us closer together. Today that ends, as our efforts in the integration of the three realms nears a close with the signing of the Union of Lublin after much deliberation between delegates of the various appanages and autonomous kingdoms and duchies of the realm. From this day foward, we move together, unified as one singular federation under the benevolent watch of the [Root.Monarch.GetTitle], guided by the principles of liberty, sovereignty, and equality for all who find themselves emancipated from the claws of tyranny and depostism."
aba_pol_events.6.a: "Pro Fide, Lege et Rege!"



################################## Poland Missions ##################################
pol_catholic_between_another_sea_title: "Between Another Sea"
pol_catholic_between_another_sea_desc: "In the far east, lies a land of opportunity. A land where the rivers flow with gold, and the plains have untapped agricultural potential. This land is known as the 'Ameruca', and it is said that those who control it will control the world. We must send our explorers to this land, and claim it for Poland."
pol_catholic_manchurian_gambit__title: "Manchurian Gambit"
pol_catholic_manchurian_gambit__desc: "Manchuria is a land rich with natural resources, yet is is controlled by the those who claim the mandate of heaven. We must find a way to weaken their hold on the region, and establish our own influence. This will require a delicate balance of diplomacy and military might, but the rewards will be worth it"
pol_catholic_dominate_central_asia_title: "Dominate Central Asia"
pol_catholic_dominate_central_asia_desc: "Central Asia is a land of great potential, yet it is also a land of great danger. The nomadic tribes that roam the steppes are fierce and unpredictable, and they will not hesitate to attack us if we show any sign of weakness. We must establish a strong presence in the region, only then can we hope to dominate this vast and untamed land."
pol_catholic_crusade_caucasus__title: "Crusade for the Caucasus"
pol_catholic_crusade_caucasus__desc: "The Caucasus is a land of great beauty and great danger. The mountains are home to fierce warriors, and the valleys are filled with treacherous terrain. Yet, it is also a land of great opportunity. The region is rich in resources, and it is a crossroads of trade between Europe and Asia. We must send our armies to conquer this land, and establish a stronghold in the heart of the Caucasus."
pol_catholic_new_polish_cities__title: "New Polish Cities"
pol_catholic_new_polish_cities__desc: "Poland is a land of great potential, yet it is also a land of great challenges. Our cities are growing rapidly, and we must ensure that they are well-planned and well-managed. We must build new cities, and improve our existing ones. This will require a great deal of effort, but it is essential for the future of our nation."
pol_catholic_tend_to_the_east_title: "Tend to the East"
pol_catholic_tend_to_the_east_desc: "The eastern provinces of our nation are rich in resources and potential, yet they are also a land of great challenges. The people of these provinces are diverse and complex, and they require special attention and care. We must invest in the development of these provinces, and ensure that they are well-integrated into the fabric of our nation."
pol_catholic_university_of_krakow_title: "University of Krakow"
pol_catholic_university_of_krakow_desc: "The University of Krakow is a beacon of knowledge and learning, and it is essential for the future of our nation. We must invest in the development of this institution, and ensure that it remains at the forefront of academic excellence."
pol_catholic_harness_the_industry_title: "Harness Industry"
pol_catholic_harness_the_industry_desc: "The industrial revolution is sweeping across Europe, and we must ensure that Poland is not left behind. We must invest in the development of our industries, and ensure that they are competitive on a global scale. We will harness the might of industry and propel our nation into a new era of prosperity and growth."
pol_catholic_amber_route_title: "Expand the Amber Route"
pol_catholic_amber_route_desc: "With the the fall of the Pagans and our recent conquests, the Amber Route, while still clinging to life, has fallen into disrepair. It was once a vital crossroads, connecting luxury goods of the Baltics and the East to the markets of Western Europe. With all the outposts and trade routes under our control, we can benefit monumentally by restoring and expanding this ancient trade route. By investing in the necessary infrastructure and technology, we can ensure that the Amber Route becomes a thriving hub of commerce once again."
pol_catholic_development_of_the_realm_title: "Development of the Realm"
pol_catholic_development_of_the_realm_desc: "The development of our realm is essential for the future of our nation. We must invest in the infrastructure, education, and development of institutions that will ensure the prosperity and growth of our nation."
pol_catholic_freedom_of_religion_title: "Freedom of Religion"
pol_catholic_freedom_of_religion_desc: "The freedom of religion is a fundamental right, and it is essential for the prosperity and growth of our nation. We must ensure that all religions are treated equally, and that no one is persecuted for their beliefs."
pol_catholic_settle_the_steppe_title: "Settle the Steppe"
pol_catholic_settle_the_steppe_desc: "The steppe is a vast and untamed land, yet it is also a land of great potential. We must encourage settlement in this region, and ensure that our settlers are well-supported and well-protected."
pol_catholic_cossack_registry_title: "The Cossack Registry" 
pol_catholic_cossack_registry_desc: "The Cossacks are a fierce and independent people, yet they are also a valuable asset to our nation. We must establish a registry of Cossack warriors, and ensure that they are well-trained and well-equipped, as well as monitoried to prevent acts of aggression or revolt."
pol_catholic_establish_the_orders_title: "Establish the Orders"
pol_catholic_establish_the_orders_desc: "The military orders are a powerful force, and they are essential for the defense and governance of our nation. We must support the establishment of these orders across our vast empire."
pol_catholic_foreign_legion_title: "The Foreign Legion"
pol_catholic_foreign_legion_desc: "With our history as crusaders and defenders of Christendom, we have always been a nation that attracts warriors from all over the world. We must harness this potential, and establish a foreign legion that will serve as a powerful force for our nation."
pol_catholic_integrate_tribal_leaders_title: "Integrate Tribal Leaders"
pol_catholic_integrate_tribal_leaders_desc: "The tribal leaders of Poland have always played a key role in the governance and defense of our nation. We must ensure that they are well-integrated into our political system, and that their voices are heard and respected. As well as their succesfull military tactics and strategies are adopted into our own military doctrine."
pol_catholic_hussars_title: "The Winged Hussars"
pol_catholic_hussars_desc: "The Winged Hussars are a legendary cavalry unit, known for their bravery and skill in battle. We must invest in the development of this unit, and ensure that they remain at the forefront of our military forces."
pol_catholic_henrician_articles_title: "The Henrician Articles"
pol_catholic_henrician_articles_desc: "With the growing bureaucracy and the increasing complexity of our government, it is essential that we establish a clear set of rules and guidelines for the governance of our nation, as well as our obligations to both the people and the nobility who have supported our campaigns against pagans and squabbling princes alike. The Henrician Articles will serve as a constitution for our nation, brokered by our Francian advisor and noblemen Henry De Valois, outlining the rights and responsibilities of our citizenry and the Szlachta, as well as the powers, limitations, and the reciprocatory obligations of the Monarch. No King shall have the right to govern without the consent of the Szlachta, and no King shall have the right to raise taxes without the consent of the Sejm. The Henrician Articles will ensure that our nation is governed in a fair and just manner, and that the rights of our citizens are protected."
pol_catholic_tartar_yoke_title: "Throw off The Tatar Yoke"
pol_catholic_tartar_yoke_desc: "While we lie far away from the perfidious claws of the Tatars, our Ruthenian brothers still suffer under their yoke. If we are to unite the people of Rus', we must be seen as liberators, and the Tatars present themselves as the perfect unifying target. Having languished for centuries under their rule, the people of Rus' will be eager to throw off their chains and join us in our crusade against these ungodly heathens. By liberating them from the Tatars, we will not only gain their loyalty and support, but we will also send a powerful message to the world that we are a force to be reckoned with, while also presenting ourselves the opprotunity to civilize and integrate these fierece warriors."
pol_catholic_novgorod_the_great_title: "Novgorod the Great"
pol_catholic_novgorod_the_great_desc: "The city of Novgorod is unofficially the second capital of Rus', shieled by vast forests and frigid tundras from the never ending destruction wrought by the Mongol Horde and its descendants. If we are to establish firm control over the region, as well as the highly lucrative fur trade, we must make Novgorod our own. The city is a major center of commerce and culture, and it will be a valuable asset to our nation. We must invest in the development of the city, and ensure that it remains a thriving hub of trade and culture for centuries to come."
pol_catholic_ports_of_the_north_title: "Ports of the North"
pol_catholic_ports_of_the_north_desc: "Throughout the North lie a variety of a key locations for new ports and trading hubs. At the mouth of the Neva river lie what the Novgorodians called Oreshek, a small settlement primarily occupied by Finno-Ugric peoples, but with a strategic location that could allow us to control access to the Baltic Sea. Further north lie the Kola Peninsula and the port of Arkhangelsk, which could serve as a valuable hub for trade with Western Europe, bypassing the Danish Sound Toll. By investing in the development of these ports, we can establish a strong presence in the North, and ensure that we are well-positioned to take advantage of the opportunities that this region has to offer."
pol_catholic_tartar_sarai_title: "The City Of Sarai"
pol_catholic_tartar_sarai_desc: "The city of Sarai was once the capital of the Golden Horde, and it is a symbol of Tatar power and influence. During our campaign, much to the dismay of the Ruthenians, we chose to spare the city, and its people, in exchange for their loyalty. Now, we must ensure that this loyalty is well-rewarded, and that the city of Sarai becomes a shining example of our benevolent rule. The fracturous Tatar people can turn to the city as a symbol unity, a place where their diverse cultures, traditions, and religions can coexist under the protection of our banner."
pol_catholic_union_of_many_peoples_title: "Union of Many Peoples"
pol_catholic_union_of_many_peoples_desc: "Well we established the Great Intermarium as union of three distinct crowns: Polish, Lithuanian, and Ruthenian, we have become so much more. Stretching from the frigid coasts of the North Sea to the warm waters of the Black Sea, and now pushing far beyond that over the Ural Mountains, we must reshape our government to reflect that diversity and our unity under Christ. We must ensure that these diverse groups are well-integrated into our political system, and that their voices are heard and respected. By fostering a sense of unity and cooperation among these different groups, we can create a strong and prosperous nation that is greater than the sum of its parts."
pol_catholic_finnish_frontier_title: "The Finnish Frontier"
pol_catholic_finnish_frontier_desc: "To our Northeast lies the land of a thousands lakes - Finland. Acting as a natural barrier between us, the Swedish Crusaders, and the Pagans of Scandanivia, it is imperative that we secure this region and establish a strong presence there. By fortifying our borders and establishing settlements in the area, we can ensure that we are prepared to defend against any potential threats from the North or create a land connection with our allies in the region."
pol_catholic_king_in_the_north_title: "Northern Deluge"
pol_catholic_king_in_the_north_desc: "Our interactions with the nations of Scandinavia have reached a critical mass. Whether the land be ruled by Catholics or Pagans, be they allies or enemies, we find ourselves still at the center of increasingly hostile struggle to control the lucrative Baltic Sea trade routes. We must decided whether we march foward and crown ourselves Kings of the North, or deepen our bonds through trade agreements and mutual defense pacts, ensuring that our two nations can coexist in peace and both propser in these times of bounty. The Sejm and the Szlachta grow ever the more impatient awaiting the input of the Chancellor and the [Root.Monarch.GetTitle]..."
pol_catholic_grand_crusade_title: "The Grand Crusade"
pol_catholic_grand_crusade_desc: "Our crusade against the heathens of the East has been a resounding success, but there are still many lands that remain under their control. Whether it be the schemeing Turks, the rising powers of Persia, the false Empire of Byzantium, or myriad number of other claimaints to the title of 'Tsar of the East', we must continue our crusade and bring these lands under our control. By doing so, we will not only expand our empire, but we will also spread the light of Christ to the darkest corners of the world."
pol_catholic_global_commonwealth_title: "A Global Commonwealth"
pol_catholic_global_commonwealth_desc: "Our empire now stretches across the globe, from the frigid coasts of the North Sea to the warm waters of the Black Sea, and beyond. We have established a strong presence in the Americas, and we are well-positioned to take advantage of the opportunities that this new world has to offer. The ideas of liberty, freedom, and equality that define our nation have drawn resounding pleas for liberation across the world, and we have become a beacon of hope for those who seek to throw off the chains of tyranny and oppression. We must continue to spread these ideals, and ensure that our global commonwealth remains a shining example of freedom and prosperity for all."
pol_catholic_crown_poland_title: "Crown of Poland"
pol_catholic_crown_poland_desc: "The Crown of Poland is the heart of our nation, where the dreams of the Intermarium were born, and where the future of our nation will be shaped. But as we grow stronger and expand further each day, the power and influence of the Crown has waned, and the new nobility that has arisen from those integrated after conquests have become more powerful. We must ensure that the Crown remains a strong and influential institution, and that it continues to serve as a unifying force for our nation."
pol_catholic_city_of_zamosc_title: "Renaissance City of Zamosc"
pol_catholic_city_of_zamosc_desc: "With the spread of the renaissance throughout our empire, one new city has emerged as its center—the city of Zamosc. Its vibrant streets are filled with merchants, artists, and scholars from all over the world, making it a hub of culture and commerce all under the watchful of eye of the Zamoyski Magnate Family. We must invest in the development of this city as well as that of the Great City of Lublin, building new markets, theaters, and universities to further enhance its status as a renaissance city. By doing so, we can attract even more talent and wealth to our empire, and ensure that Zamosc remains a shining example of our cultural and economic prowess."
pol_catholic_patronage_of_west_title: "Patronage of the West"
pol_catholic_patronage_of_west_desc: "As we have established ourselves as a dominant power in the East, it is now time to turn our attention to the West. We must strengthen our ties with Western Europe, and ensure that we are seen as a valuable ally and partner, while also harnessing their technological and economy advancements."
pol_catholic_fusion_of_east_and_west_title: "A Fusion of East and West"
pol_catholic_fusion_of_east_and_west_desc: "Our nation lies at the center of a new cross-cultura and economic exchange, where the lines between what defines East and West are becoming increasingly blurred. We must embrace this fusion of cultures, and ensure that we are able to harness the best of both worlds to create a strong and prosperous nation. By doing so, we can create a unique identity for our nation that is both rooted in our history and culture, while also being open to new ideas and influences from around the world."
pol_catholic_cossack_szachta_title: "Cossack Szlachta"
pol_catholic_cossack_szachta_desc: "The Cossacks have long been a valuable asset to our nation, and they have played a key role in our military campaigns and the defense of our borders. We must ensure that they are well-integrated into our political system, and that they are given the respect and recognition that they deserve. By granting them the status of Szlachta, we can ensure that they are fully integrated into our society, and that they have a voice in the governance of our nation. This will also help to foster a sense of unity and cooperation among the different groups within our nation, and ensure that we are able to harness the full potential of our diverse population, while preventing this rowdy bunch from rebelling in the name of percieved attacks against their autonomy."
pol_catholic_ruthenian_crown_title: "The Ruthenian Crown"
pol_catholic_ruthenian_crown_desc: "The Ruthenian Crown is a symbol of our commitment to the people of Rus', a commitment to their dreams of a unity under the banner of Christ, and a commitment to their prosperity and growth. We must ensure that the Ruthenian Crown remains a strong and influential institution, and that it continues to serve as a unifying force for the people of Rus'. By doing so, we can ensure that the people of Rus' remain loyal to our cause, and that they continue to support our efforts to expand our empire and spread the light of Christ across the world."
pol_catholic_duchy_lithuania_title: "Grand Duchy of Lithuania"
pol_catholic_duchy_lithuania_desc: "The Grand Duchy of Lithuania, while culturally distinct from both the Polish and Ruthenian Crowns, has always been an integral part of our nation, controlling our key Baltic Trade Ports and providing us with a strong military force. Their loyalty is key for maintaing control over the rapidly Polonizing Baltic tribes as well as the Finno-Ugric peoples of the North. By investing in the development of the Duchy, we can ensure it remains on equalling footing with the other two crowns, and continues to serve as a faithiful ally and partner in efforts to dominate the East."
pol_catholic_golden_liberty_title: "The Golden Liberty"
pol_catholic_golden_liberty_desc: "The Golden Liberty is a unique political system that has evolved in our nation, where the nobility, or Szlachta, have significant power and influence over the governance of our nation. While this system has its advantages, it also has its drawbacks, as it can lead to political instability and infighting among the nobility. We must ensure that the Golden Liberty remains a strong and influential institution, while also implementing reforms that will help to mitigate its negative effects. By doing so, we can ensure that our nation remains strong and prosperous, while also maintaining the support and loyalty of our powerful nobility."
pol_catholic_adapt_ruthenian_customs_title: "Traditions of Ruthenia"
pol_catholic_adapt_ruthenian_customs_desc: "The people of Rus' have a rich and vibrant culture, with traditions that have been passed down for centuries. We must embrace these traditions, and ensure that they are well-integrated into our own culture. By doing so, we can create a unique and vibrant culture that is a fusion of Polish, Lithuanian, and Ruthenian influences, while also fostering a sense of unity and cooperation among the different groups within our nation. This will help to ensure that the people of Rus' feel a strong connection to our nation, while also adopting the most beneficial aspects of their culture and ways of governance."
pol_catholic_abolish_serfdom_title: "The Question Of Serfdom"
pol_catholic_abolish_serfdom_desc: "Serfdom is a system that has long been a part of our nation's history, but it is also a system that has caused great suffering and inequality, speficially within Ruthenia. We must take steps to abolish serfdom, and ensure that all of our citizens are treated with dignity and respect. By doing so, we can create a more just society, and continue our eteneral effort towards the ideals of liberty and freedom that define our nation. But our Szlachta will not take kindly to this massive upset to the socio-economic system that has benefited them for centuries, and many in our court argue for the status quo. It now lies with the King to make this difficult decision..."
pol_catholic_age_of_ruthenian_liberalism_title: "Ruthenian Liberalism"
pol_catholic_age_of_ruthenian_liberalism_desc: "The Age of Ruthenian Liberalism is a time of great change and progress for our nation, as we embrace the ideals of liberty and freedom that have taken root in the hearts of our people. We must ensure that these ideals are upheld and protected, while also fostering a society that is just and equitable for all. By doing so, we can create a brighter future for our nation, one that is built on the foundations of liberty, equality, and justice."
pol_catholic_baltic_magnates_title: "Baltic Magnates"
pol_catholic_baltic_magnates_desc: "A new and influential class has emerged in the Baltic region, made up of powerful and wealthy landowners who have amassed great wealth and influence through their control of the lucrative trade routes and resources in the region: The Baltic Magnates. Acting as powerful intermediaries between the Crown and the local populations, they have become key players in the governance and development of the region. We must ensure that we maintain a strong relationship with these magnates, while also ensuring that they do not become too powerful or influential, as they can pose a threat to the stability and unity of our nation if left unchecked."
pol_catholic_land_reclamiation_title: "Land Reclamation"
pol_catholic_land_reclamiation_desc: "The lands of the East are vast and untamed, yet they are also a land of great potential. We must invest in the reclamation of these lands, and ensure that they are well-managed and well-protected. By doing so, we can create new opportunities for settlement and development, while also ensuring that we are able to harness the full potential of our vast empire."
pol_catholic_farm_to_table_title: "Farm to Table"
pol_catholic_farm_to_table_desc: "The agricultural potential of our lands is vast, yet it is also a land of great challenges. We must invest in the development of our agricultural industry, and ensure that our farmers have the resources and support they need to succeed. By doing so, we can create a more sustainable and prosperous agricultural industry, while also ensuring that our people have access to fresh and healthy food, in addition to creating a vast surplus for export."
pol_catholic_baltic_metropoli_title: "Baltic Metropolises"
pol_catholic_baltic_metropoli_desc: "In the past century, the humble trading posts of the Baltic have blossomed into vibrant and bustling metropolises, with thriving economies and diverse populations. These cities have become centers of culture and commerce, attracting people from all over the world. We must invest in the development of these cities, cementing our control over Baltic Sea trade and the valuable Amber Route."
pol_catholic_litvin_duchy_title: "Grand Duchy of Litvinia"
pol_catholic_litvin_duchy_desc: "Once known as Lithuianians, centuries of our benvolent rule and the spread of Polish culture has led to the gradual Polonization of the Baltic tribes, with many now identifying as 'Litvin' rather than Lithuanian. The Grand Duchy of Litvinia is a symbol of this transformation, and we must nuture this blossoming identity in the name of national unity. The Litvins have become the backbone of our economic power and offer talented military leaders passed down from their tribal traditions. By treating them as equals within our union, we can ensure their loyalty and support, while also fostering a sense of pride and identity among the Litvin people."
pol_catholic_republic_of_three_nations_title: "Republic of Three Nations"
pol_catholic_republic_of_three_nations_desc: "While we may be ruled by a King, our nation is truly a republic, where the voices of our people are heard and respected. The Polish, Lithuanian, and Ruthenian Crowns are united under a single banner, while also maintaining their distinct identities and cultures. The Great Sejm meets regularly to discuss the affairs of our nation, and the Szlachta have significant power and influence over the governance of our nation. The King will never hold absolute power as much as they may wish, and the Golden Liberty ensures that the rights and freedoms of our citizens are protected. For we are a republic of three nations, founded on common ideals and goals, freedom from tyranny, whether it be from within our without."
pol_catholic_military_development_title: "Military Development"
pol_catholic_military_development_desc: "A strong military is essential for the defense and expansion of our nation. We must invest in the development of our military, and ensure that it is well-trained and well-equipped."
pol_catholic_command_of_hetman_title: "Command of the Hetmans"
pol_catholic_command_of_hetman_desc: "The Hetmans are the highest-ranking military commanders in our nation, and they play a key role in the defense and expansion of our nation, controlling the armies of each of our individuals crowns, working together syngeristically to defend our borders and expand our influence. We must ensure that they are well-trained and well-equipped, and that they have the resources and support they need to succeed in their missions. By doing so, we can create a strong and effective military that is capable of defending our nation and expanding our empire."
pol_catholic_pospolite_ruzenie_title: "Pospolite Ruzenie"
pol_catholic_pospolite_ruzenie_desc: "The Pospolite Ruzenie is a unique military system that has evolved in our nation, where the nobility, or Szlachta, are called upon to serve in the defense of our nation. While this system has its advantages, it also has its drawbacks, as it can lead to political instability and infighting among the nobility. But it is the precursor to a modern standing army. We must begin reforms to this levy system, and ensure it can operate effecitvely during times of need."
pol_catholic_continous_defense_title: "Continuous Defense"
pol_catholic_continous_defense_desc: "Our nation is surrounded by potential threats, both from within and without. We must ensure that we are always prepared to defend ourselves against these threats, and that we have a strong and effective military that is capable of responding to any potential attack. By maintaining a state of continuous defense, we can ensure that our nation remains safe and secure, while also deterring potential aggressors from attacking us in the first place."
pol_catholic_modern_conscription_title: "Modern Conscription"
pol_catholic_modern_conscription_desc: "The conscription system is a key component of our military, and it is essential for the defense and expansion of our nation. We must ensure that our conscription system is modern and effective, and that it is able to provide us with the manpower we need to defend our nation and expand our empire. By implementing reforms to our conscription system, we can ensure that it is able to meet the demands of our growing nation, while also ensuring that it is fair and equitable for all of our citizens."
pol_catholic_wojsko_kwarciane_title: "Wojsko Kwarciane"
pol_catholic_wojsko_kwarciane_desc: "The Wojsko Kwarciane is a unique military unit that has evolved in our nation, where a portion of the military is funded by a tax on the nobility, or Szlachta. This system has its advantages, as it allows us to maintain a strong and effective military without placing too much of a burden on our citizens. It is the foundation of a modern standing army, one that can be built upon and expanded as our nation grows."
pol_catholic_westernization_title: "Westernization"
pol_catholic_westernization_desc: "In our most recent campaigns against West forces, we emerged victorious, and we have captured a wealth of knowledge and technology from our enemies, yet it came at a great cost. Western firearms, cannons, and tactics have proven themselves to be far more effective that what we employed against our enemies in the East. We must begin the process of westernization in our military, to ensure that we will be able to face the challenges that are yet to come."


