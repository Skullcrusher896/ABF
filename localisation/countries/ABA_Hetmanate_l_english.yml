  l_english:
  ################################## Country Events ##################################
  aba_hetmanate.1.t: "Hussar Regiments Arrive"
  aba_hetmanate.1.d: "Our integration of Poland has gone well. Fusing their frontier spirit and will to survive with the martial prowess of the Cossacks has produced unpredecented results. Their famed Hussar regiments have pledged themselves to our cause of liberty and freedom."
  aba_hetmanate.1.a: "And the Winged Hussars Arrived!"
  aba_hetmanate.2.t: "Integration of The Tatars"
  aba_hetmanate.2.d: "We share mainly similarities with the Tatars, especially those of the Crimean Khanate, after years of skirmishes and light cross-border trade, our recent conquest of some of their lands has left us with the question of integration and assimilation into one of our many Cossack hosts. We both follow the Orthodox Faith, praying for Christ to guide our blows as we once battled against one another. They skilled riders, and possess the same martial spirit our people do. Most of all they longed for freedom—freedom from the rapidly decaying khanate that was the Golden Horde, and domination from the rising powers of Anatolia and Central Asia. Many of them are beginning to offer their services to us, and the question is, do we accept?"
  aba_hetmanate.2.a: "Welcome brothers! Freedom awaits!"
  aba_hetmanate.2.b: "While we both fight the same battles, they have knowledge of ruling the Steppe..."
  aba_hetmanate.3.t: "Fate of The Uniate Church"
  aba_hetmanate.3.d: "With the conversion of the ruler and nobility of §Y[VOL.GetName]§! to the false intepretation of the True Faith, many in the lands followed suit, seeking acceptance and status within these new political and religious strucutre. While religion is important to us, it's enforcement is not a focus of our government, being the free people that we are. But the influence of the West and the Pope represented by this mass conversion may pose a threat to our authority and the security of Metropolitanate. We are presented with two choices, to steamroll this upstart institution and return the land and its people to the fold, or accept our wayward brothers with open arms, guaranteeing their religious independence."
  aba_hetmanate.3.a: "We will purge the influence of the Pope once and for all!"
  aba_hetmanate.3.b: "Let them be, for they are harmless..."
  aba_hetmanate.4.t: "Dawn of the Hetmanate"
  aba_hetmanate.4.d: "On this day, hundreds gather from across the open stepppe and wild fields to become part of something greater than our once humble host. As we've grown and liberated those around us from the claws of tyranny, a number of the emancipated have adopted our way of life, our martial culture, as well as our unique customs and traditions. They have organized themselves into myriad new hosts, spreading across the East like wildfire, propagating the ideas of freedom and equality wide and far. A greater identity has began to form, one of the Cossacks, the 'free people.' With the emergence of this new identity, the Atamans and Starshyna from across the land have convened in [Root.Capital.GetName] to affirm the supreme authority of the Hetman over a new state—The Hetmanate. While each host was once led by their own Hetman, they have accepted their role as Atamans and vested executive power into the hands of the Zaporozhian Host, unifying our diverse and fiercely independent under a common ideal: honor and brotherhood."
  aba_hetmanate.4.a: "'A hundred friends are not too many; one enemy is.'"
  aba_hetmanate.5.t: "Cossacks of The High Seas"
  aba_hetmanate.5.d: "The rapidly developing port city of [33.GetName] has been the epicenter of a new Cossack culture, one that has fused with the local maritime culture to create a unique identity. These Cossacks of the High Seas have become skilled sailors and fishermen, navigating the treacherous waters of the Baltic and North Sea with ease. They have also become adept at raiding and piracy, preying on the ships of our enemies and bringing back valuable loot to our shores. With our recent expansion into the Baltic region, we have a chance to harness this new culture and use it to our advantage in our ongoing struggle for freedom and independence."
  aba_hetmanate.5.a: "Raise the Sails!"
  aba_hetmanate.6.t: "Select a Country Name"
  aba_hetmanate.6.d: "The liberation of Rus comes with three different cosmetic names. Pick it to your liking."
  aba_hetmanate.6.a: "We will be known as Free Ruthenia!"
  aba_hetmanate.6.b: "We will be known as The United Hosts!"
  aba_hetmanate.6.c: "We will be known as Hetmanshchyna!"
  aba_hetmanate.6.de: "Our current name is fine."
  aba_hetmanate.7.t: "The Malorossian Host"
  aba_hetmanate.7.d: "The once mighty warriors of the Baltic Pagan tribes have been rebirthed as fierce and independent Cossacks, known as the Malorossian Host. They have become a unique and formidable force, fusing the warlike traditions of local Baltic tribes and the martial spirit of the Cossacks into one. They have became the vanguard of the West, guarding the frontier against the encroaching influence of the Catholic Church as well as Norse Pagans and Crusaders alike. With their bravery and skill in marksmanship, they have become an integral part of our nation, and we must ensure that they are properly represented in our government and that their unique culture and traditions are preserved."
  aba_hetmanate.7.a: "The Thunderers of Perun now see the light of Christ!"
  aba_hetmanate.8.t: "The Terek Host"
  aba_hetmanate.8.d: "As the Don Cossacks pushed Southward, they ran into many tribes and groups of people along the Terek river, primarily Alanian and Cumanian, but also the hardy Circassian and Chechen progenitors of the feared and respected Mamluk slave soldiers. While the conflict between these groups was often bloody and brutal, they also shared many similarities in their way of life, their love of freedom, and their martial culture. As the Cossacks settled along the Terek, they began to intermingle with the local populations, adopting many of their customs and traditions, resulting in a unique fusion of cultures. With this new southern frontier now under our control, many are lobbying for the creation of the Terek Host, a more military structured Cossack organization that will act as a bulwark against threats of the South."
  aba_hetmanate.8.a: "The fierce warriors of the Caucasus have joined our cause!"
  aba_hetmanate.9.t: "Haven For The Oppressed"
  aba_hetmanate.9.d: "Our state was founded by those fleeing the despotism and tyranny of lesser men. They bonded together by their love of freedom and their bitter struggle for independence against the insidious institution of Serfdom and the yoke of the Khan, we have become known across the land as home for all those seeking a better life. While we have made opprotunistic alliances with some of the surrounding powers, we have always been a thorn in the side of the great empires of the world, and a beacon of hope for the oppressed. With our recent expansion and growing influence, we have a chance to further solidify this reputation as a haven for the oppressed, welcoming those seeking emancipation with open arms. Every so couple months we experience an influx of new peasants, equipped with myriad skills and talents. The question that arises though, is how do we integrate these new people into our society, and harness their potential to further our cause of freedom and liberty?"
  aba_hetmanate.9.a: "We will welcome all those seeking freedom and opportunity!"
  aba_hetmanate.9.b: "Let them settle the vast Steppe, driving our economic development!"
  aba_hetmanate.9.c: "Let them test their mettle on the battlefield, embracing Kozatstvo!"
  aba_hetmanate.10.t: "Establishing The Hetman's Choice Monopoly"
  aba_hetmanate.10.d: "Having pursued a mixed policy of mercantilism and physiocracy, the Hetman has decided to establish a choice monopoly over a specific sector of our raw goods sector. With full control over the customs, levys, production, and extraction of these raw resources, we can bolster the Military Treasury and ensure that our army and the state have the funds to continue their campaigns abroad and guide the development of the nation. There are many sectors to choose from, each vital to our economy and the production pipeline across Europe as a whole. We must choose wisely, for we will not be able to establish another monopoly without staunch opposition from both the citizenry, the Starshyna, and the Clergy...."
  aba_hetmanate.10.a: "It would be wise to secure the §YIron§! trade, for the sake of the army!"
  aba_hetmanate.10.b: "The §YCopper§! trade is essential for the production of cannons!"
  aba_hetmanate.10.c: "A staple good for the artians and guilds, the §YCloth§! trade it is!"
  aba_hetmanate.10.de: "An Army marches on its stomach, monopolize the §YSalt§! trade!"
  aba_hetmanate.10.f: "§YWool§! is the backbone of the Steppe economy, we'll take it!"
  aba_hetmanate.11.t: "Fate of The Elected Cossacks"
  aba_hetmanate.11.d: "Division and social stratification have been approaching a breaking point in Cossack society, as the Starshyna continue to amass power and wealth while opprotunities for social mobility have been all but frozen for those beneath them. In the middle of this struggle, the Hetman finds himself torn between two sides, with the Elected Cossacks and their helpers pleading for formal codification of their rights and privileges, in an effort to level the playing field. While on the other hand, the Starshyna plot and scheme their way to political security, enticing the Hetman with offers beyond their wildest dreams. But the time for debate is over, and a decision must now be made, one that will determine the future structure of society going into the future..."
  aba_hetmanate.11.a: "The Starshyna must be stopped right here, right now!"
  aba_hetmanate.11.b: "It is in our best interest to preserve their power, for the Starshyna make powerful allies..."
  



  ################################## HETMANATE Missions ##################################
  htm_strike_popes_puppets_title: "Strike at the Pope's Puppets"
  htm_strike_popes_puppets_desc: "The Pope's influence in our region is a threat to our sovereignty and independence. We must strike at the Pope's puppets, ensuring our religious and political freedom."
  htm_marshland_buffer_title: "Princes of The West"
  htm_marshland_buffer_desc: "To our west lies a vast and uncivilized stretch of Europe, filled with pagan tribes and hostile nations. We must push our western frontier, establishing a buffer zone of friendly states and fortifications to protect our heartland from invasion."
  htm_military_treasury_title: "Military Treasury"
  htm_military_treasury_desc: "Our nation's diverse means of agriculture and production needs to be organized if we seek to throw of the yoke of foreign powers. Many in our cabinent are suggesting the creation of a 'military' treasury, granting the Hetman greater control over the nation's finances in order to better fund our armies and expeditionary ventures."
  htm_free_ruthenia_title: "Free Ruthenia"
  htm_free_ruthenia_desc: "For ages have the people of Ruthenia struggled against tyrants and oppressors. With our victory over the great Mongol hordes, and weakening of the many surrounding princely states, we have a chance to liberate the Ruthenian people and usher in a new and unpredecented era of freedom and prosperity. No longer will the people play second fiddle to bloody thristy tsars and schemeing merchants, but will be the masters of their own destiny!"
  htm_albanizan_host_title: "Raise the Albanizan Host"
  htm_albanizan_host_desc: "As we continue to push eastward, we find the ideals of freedom and liberty resonate with the many inhabitants of Eurasia. Our settlers along the Amur river have become increasingly more intwined with local customs and traditions, resulting in a strange fusion of Chinese and Cossack culture. We must harness this potential, and raise the Albanizan Host, a mighty army of Cossack warriors and local militias that will serve as the vanguard of our expansion into the east."
  htm_baltic_host_title: "Baltic Host"
  htm_baltic_host_desc: "With the Baltic region now under control, a new class of Cossack has emerged. Primarily composed of exiles and young adventurers looking to make their fortune, The Malorossian cossacks are a fierce and independent people, known for their bravery and skill in marksmanship. Fusing with the warlike traditions of local Baltic tribes, they have become a unique and formidable force. We must clear way for their expansion and formalize the creation of the Malorossian Host to ensure proper representation!"
  htm_terek_host_title: "Terek Host"
  htm_terek_host_desc: "A group of Cossacks have settled along the Terek river, intermingling with the local Circassian and Chechen populations. These Cossacks have adopted many of the customs and traditions of their new neighbors, resulting in a unique fusion of cultures. With this new southern frontier now under our control, many are lobbying for the creation of the Terek Host, a more military structured Cossack organization that will act as a bulwark against threats of the South."
  htm_turkic_brothers_title: "Turkic Brothers"
  htm_turkic_brothers_desc: "The vast steppes of Eurasia are home to a group of Russo-Turkic Cossacks known as the Nagaybaks. Famed for their skill on horseback and ability to withstanding the harshest of conditions, they are integral part of our nation. We must ensure that they are properly represented in our government, and that their unique culture and traditions are preserved."
  htm_danube_host_title: "Danubian Sich"
  htm_danube_host_desc: "The Balkans are a land of great turmoil. It was not long ago that the Magyar horde had swept through our lands, eventually settling in the Carpathian basin. We share many military values with the Magyars, and their strong tradition of tribal organization blinds well to our current system. We must establish a new Sich to govern our affairs in the Balkans!"
  htm_balkan_host_title: "Balkan Host"
  htm_balkan_host_desc: "In the Balkans lie are South Slavic brothers. Languishing under the rule of many oppressors over the ages. It is time we reunite with them, and liberate the land from foreign oppression!"
  htm_liberate_the_poles_title: "Liberate the Poles"
  htm_liberate_the_poles_desc: "Poland is a land of great opportunity, yet it remains divided amongst religious conflicts and foreign occupation. The people of Poland earn for freedom, and their infamous calvary training would do wonders for our most elite units. It is time we free Poland!"
  htm_cossack_registry_title: "Cossack Registry"
  htm_cossack_registry_desc: "With the rapid expansion of the realm and the creating of numerous hosts, we must create some kind of centralized body to oversee the collection of taxes, conscription, and voter registration. Our cabinent members have proposed the creation of a national cossack registry, defining the rights and privileges of the various hosts, and increasing our adminstrative efficiency."
  htm_horse_prodction_title: "Expand Horse Breeding"
  htm_horse_prodction_desc: "Horsemanship is a way of live here in the Hetmanate. It is an essential part of Cossack culture and integratal to military success. With new Cossacks coming of age everyday as we continue our expansion, more horses will be needed to bolster the ranks of the forces and preserve our way of life."
  htm_regimental_rule_title: "Regimental Rule"
  htm_regimental_rule_desc: "With the military spirit of our nation, we often find commanders, chiefs, and captains. The Atman has suggested we establish a system of Sotnia, or military adminstrative units assigned to regiments of the army. They will be in charge of preserving order, tax collection, and the execution of the law. It would also increase our ability to mobilze the population during periods of war, and control the distrubtion of loot."
  htm_vast_fields_of_ruthenia_title: "Vast Fields of Ruthenia"
  htm_vast_fields_of_ruthenia_desc: "Ruthenia has commonly been known as the breadbasket of Europe in many circles. Our grain travels from the Neva to the Nile, helping to feed the largest empires known in history. Its time we invest heavily in shoring up this economic lifeline."
  htm_mills_and_brewies_title: "Mills and Breweries"
  htm_mills_and_brewies_desc: "Taxiation and the production of alcohol have always been the backbone of economy. Many are suggesting we loosen the law to help encourage the expansion of this operations. We can settle on reduced tax income for now, in exchange for the expansion of infrastructure vital to their industries."
  htm_vodka_title: "Hetman's Vodka"
  htm_vodka_desc: "Vodka has been surging in popularity with our most recent conquests. Its unique flavor and smooth texture, as well as its enhanced tasting while ice cold, have made it the go to for bands of roving Cossacks looking to unwind. It's relatively simple production too is something that has not gone unnoticed by the Hetman, who proposes the mass expansion of distilleries and spirit makers to satisfy the people's choice."
  htm_new_coinage_title: "New Coinage"
  htm_new_coinage_desc: "Independent currency is crucial to controlling the economy and reducing our independence on bartering. It will have a standard value pegged to the price of grain and alcohol, and allow use to engage in trade on an international scale."

  htm_recieve_serfs_title: "Haven For The Oppressed"
  htm_recieve_serfs_desc: "While having to condemn ourselves to make opprotunistic alliances with tyrants and oppressors, none are worse than the perfidious Horde that causes all of Rus' to languish under its iron grip. But our contact and communication with the princes of The East has convenyed a message that resonastes with the poor citizenry that tires under their rule. We are a safe haven for all, where a man can find himself unburdened by the false authority of ancient lineage and noble titles. Where a man can freely stake and work a piece of land, express himself freely within government, give his consent in the process of taxation and conscription. Over the past few weeks we have seen flocks of serfs, petty nobles, and layman alike travel to our land in search of freedom of opprotunity. Their desire and passion for freedom turns into fervor on the battlefield, fighting to the last breath to protect what is now theirs. We are truly a home for all seeking liberty and equality in this world."
  htm_tatar_cossacks_title: "The Tatar Cossacks"
  htm_tatar_cossacks_desc: "The word 'Cossack' used to refer to our sworn enemy, as just like us, while placing their alliegance in the Khan, rode the Steppes as free people of the saddle, unburdening by unjust taxation, petty noble bickering, greedy clergymen, and centralizing power. As we've pushed further into their lands, a cross-cultural exchange has occured, and we have come to realize we are not so different after all. Many new hosts of arisen in the settlement of The East, leading to the integration and assimilation of the Tatar people, as they adopt our customs and we borrow what we want from theirs. It would be wise to carefully consider next what we do with these fierce warriors, as they could prove valuable in our upcomning campaign to liberate Ruthenia from the tyrannical princes."
  htm_rise_of_the_hetmanate_title: "Dawn of The Hetmanate"
  htm_rise_of_the_hetmanate_desc: "We have triumphed over all those who wished to snuff out the fires of independence. To the East, we struck down the once mighty Mongol horde through the might of our martial spirit and out-manuevered them by the swiftness of our horses. To the North, we saved the Holy Patriarchate from the corrupt and klepocratic hands of surreptitious clergymen, who sought to sully the name of the Church in pursuit of material wealth and personal gain, and struck down the false claimants to the legacy of Rus' that lied on the other bank of the Dnipro. To the West we purged the influence of the Pope and his attempts to force Catholicism upon us, returning Red Ruthenia back to its people. Today the hosts from across our lands gather in [Root.Capital.GetCapitalName], to discuss our future, for we have spread to far to be effectively governed by the old ways of the Sich Rada. Today the Hetman truly can embody the title and role of Hetman—'Father of The Horsemen', as declare ourselves the rightful heirs of the Ruthenian legacy, and ride fourth to liberate the lands of The East from the claws of illegimate rulers, pagans, and greedy merchant republics. The Hetman shall lead us to victory!"
  htm_settle_pennisula_title: "Settle Crimea"
  htm_settle_pennisula_desc: "Crimea has always been eyed by our people as the jewel of the Black Sea. It connects us further beyond, to Western Europe, Egypt, and the Middle East. It is a hub of trade and culture, with many empires leaving their mark on the area over the past few centuries. But now it is our turn. While we had carried our raiding parties and engaged in small amounts of trade on the pennisula, we must rapidly construct new settlements and ports, granting land to newly freed serfs and Cossacks who've proved their mettle in the heat of battle, rewarding and providing those who have served us or remained long oppressed with the opprotunity for a new life. With its warm waters and strategic location, Crimea will provide them with ample opprotunity."
  htm_chernomoriya_host_title: "Chernomoriya Host"
  htm_chernomoriya_host_desc: "The Crimean Pennisula is a key strategic location for our people, with many Cossacks already settling the area and mingling with the local population to rapidly integrate these lands into the Hetmanate. One prominement group, the Chernomoriya, or Black Sea Host, has rapidly began building settlements, and educating the Tatars of the area in our martial traditions and cultural customs. The interaction between the two has produced a unique identity, fusing Gothic, Tatar, and Ruthenian cultures into a distinct new subsect of Cossack society. We should further encourage the development of this identity, cementing our control over the region and granting us access to new economic opprotunities with the nations of Anatolia and further beyond into the Mediterranean. New settlements shall be erected, and colonels assigned, and regiments raised, all to prepare us for further expansion East."
  htm_chumaks_title: "The Chumaks"
  htm_chumaks_desc: "The Chumaks are a traditional wagon based trading occupation present in the Black Sea, being the backbone of coastal economy for many centuries. With our expansion into the Pontic Steppe, we have finally secured safe and guranteeed passage for the delivery of goods by these people, primarily salt, fish, and grain, taking these staples of our economy far into new and lucrative markets. We should support these independent traders, providing them with security and other investments from the military treeasury, as the income generated from them could be paid back two-fold if they complete their journey. It's time to show our gratitude for the invaluable role they play in our economy."
  htm_rostov_on_don_title: "Found Rostov"
  htm_rostov_on_don_desc: "Many Cossacks heading into Steppe are settling along the Don river, but one settlement near the mouth of the river has experienced rapid growth—Rostov. It's already beginning to develop a large port becoming key for our export market, as well as becoming a strong base of our operations for Cossack Hosts heading Eastward, acting as a resupply point and safe haven for those tired of battle or weary from travel. We should take some funds from the military treasury to directly invest in the development of this settlement, creating a stronghold in the Pontic Steppe a new base of operations in the East for further campaigns against the remanants of the Mongol Horde."
  htm_belyana_trade_title: "Belyana Trade"
  htm_belyana_trade_desc: "Since we reached the Volga river, a new and fascinating method of trade has began to occur: The Belyana Trade. Some of the largest wooden ships known to man, built without any specialized tools or plans, they are used to transport massive loads of timber down river to ports like Rostov or Astrakhan, being entirely composed of their cargo. Disassembled upon arrival, and built once again with new materials once enough timber has been gathered upstream, these innovative yet simple ships are crucial to getting vital building material to the vast lands of the Steppe for new Cossack settlements. We should help aid the traders that built these behemoths, providing them with the tools and manpower needed to bring home greater lumber harvests."
  htm_don_kuban_cossacks_title: "Don-Kuban Cossacks"
  htm_don_kuban_cossacks_desc: "With our settlement of the North Caucasus and areas along the Don and Volga rivers, two new Cossack Hosts have emerged: The Don Cossacks and the Kuban Cossacks. Mixing with local Tatar and Caucausian tribes, they have both individually forged unique, vastly independent, and somewhat spartan identities. The Don Cossacks are known for their military prowess, being some of the first Cossacks to head East and settle the frontier, composed of large swaths of fleeing serfs and those yearing for freedom from the unjust social order that permeates the princedoms of Rus'. They honed their warrior spirit fighting against the remanants of the Hordes and blood thristy South Caucausian tribes early upon their arrival. While the Kuban Cossack, still remaining compotent warriors, honed their adminstrative skills, creating some of the most well-developed stanitsas in the Hetmanate. Public education, being one of the staples of their adminstration, creating a thriving cultural hub for the Cossack way of life on the rugged steppes. But with such close proximity, and the numerous threats that surrounde them, the Don and Kuban Cossacks came together to form a mutual union, exchanging services between one another such as a protection or trading educators and skilled bureaucrats, causing such overlap in their culture and adminstrative units they've begun to be seen as one. The sheer talent and ambition held by this Host must be highlighted, and many within the General Staff suggest granting them special privileges and tithes for their service in the settlement of the East. For it is only right."
  htm_redistribute_serfs_title: "Land Redistribution"
  htm_redistribute_serfs_desc: "The squabbling princes of Rus' lie at our feet, stripped of their land and titles, they are no better than the serfs that once served them. But with their defeat we have accumulated a massive amount of wealth and land, far too much to be held by a state with principles like our own, for we would be no better than those we just subdued if we held on to such a large fortune. The time has come to redistribute the land and wealth we have acquired, but the question that lies before is: do we award the brave Cossacks who valiantly fought to strike down oppression? Or do we grant the newly liberated serfs some kind of recompense for their suffering? We must decide wisely..."
  htm_ports_of_north_title: "Windows to the West"
  htm_ports_of_north_desc: "Our victory over the corrupt Republic Of Novgorod has opened up trade access to the Baltic Sea at the mouth of the river Neva, while we have also opened up trade routes around the Danish Sound Toll and Hanseatic Kontors through the White Sea in the far North. It would be worth while to develop these ports, acting as strong chokepoints against invasion from any Scandinavian whether it be the Pagans or Crusaders, and to firmly establish their position as key trading ports along the Northern Trade Routes."
  htm_true_heirs_title: "True Heirs Of Rus"
  htm_true_heirs_desc: "We have done it: unified Rus. Ages ago, the great state of Kyivian Rus had ruled from Novgorod to Odessa, ensuring peace and prosperity for its people, until the Mongol Hordes arrived and destroyed everything they worked for. While they laid the foundations for our people and our culture, they still suffered from the curse of depostism, ruled by a foreign dynasty, plauged by the internal squabnle of nobles, and the lack of a strong military force. Our victories over those that sought to destroy Rus, or claim its legacy and warp it into some cruel impression of the past, has affirmed in the eyes of the world and our people, that we are the true heirs of Ruthenia. A Free Ruthenia. A Fair Ruthenian. And Honorable Ruthenia."
  htm_hosts_of_the_steppe_title: "Hosts of the Steppe"
  htm_hosts_of_the_steppe_desc: "The assimilation of the Tatars, the Caucausian tribes, and the Turkic peoples of Central Asia has led to slew of new mixed Hosts to emerge, as many we share many traditions and cultural similarities with these people. As our people move East, they've learned to nuture these similarities into a full-blown cultural syncretism, leading to the rise of new distinct Cossack Hosts among these liberate lands. Even regions that have largely been uncolonized in our push Easts we find self-proclaimed Cossacks associating with our identitiy and prinicples, seeking to be 'free' people just like us."
  htm_siberian_towns_title: "Found New Towns"
  htm_siberian_towns_desc: "Siberia lays within our control, with routes, roads and villages blossoming. However, the prosperity of Kyjev, Novgorod and the other jewels of the west dwarf the sorry, humble likes of our new holdings. Let us create fully-fledged towns, making these little settlements true population centres, true cities, true homes."
  htm_new_world_title: "A Free New World"
  htm_new_world_desc: "Far to the East lies a new world, one free from the taint of tyranny and oppression. A land with enough to go around for all, one with endless and bountiful opprotunity. While the oppressors have reached what they call 'the East Coast', the gateway to the West is open for us, and we must rapidly move to claim this land for our people before its too late."
  htm_preserve_title: "Question of The Cities"
  htm_preserve_desc: "As the realm expands, both in population and territory, the question of how to govern these new lands and people becomes more pressing. Our way of life has emphasised a deep conntection to the land and agriculture, with much of the population and economy being concentrated in the vast fields of Ruthenia, but that is beginning to change. With our expansion into the interior of Rus, much of the merchant class and the elite are beginning to settle in cities, investing in manufacturing, production, and universities. These cities are rapidly becoming centers of culture and innovation, but they also represent a shift away from our traditional way of life. We must decide how to preserve our identity and values while embracing the benefits of urbanization and modernization."
  htm_support_clergy_title: "Role of The Clergy"
  htm_support_clergy_desc: "The Orthodox Church has always been a pillar of our society, providing spiritual guidance and support to our people. But they are also some of the largest landowners in the realm and control vast monopolies over certain parts of the agricultural sector. They have begun to have a significant influence on our politics and economy. With our recent expansion and the influx of new people, the role of the clergy in our society is becoming more complex. We must decide how to support the church while also ensuring that they do not become too powerful or corrupt, and that they continue to serve the needs of our people rather than their own interests." 
  htm_land_rights_title: "Land Rights"
  htm_land_rights_desc: "The land is the lifeblood of our people, and the foundation of our way of life. It was easy to maintain a connection to the land when we were a small host, but now that we have expanded into a vast nation with many different regions and cultures, the question of land rights has become more complex. We have become increasingly stratified as a society, with a growing elite class of wealthy landowners and merchants, while many of the common people struggle to make a living. We must decide how to distribute land and resources in a way that is fair and just, while also ensuring that we maintain our connection to the land and our traditional way of life."
  htm_dwellings_title: "Cossack Dwellings"
  htm_dwellings_desc: "Dwellings, or 'houses in two halves' have long been the traditional style of home in our domain. Some humble and some grand, they represent the heart of our cultural identity. Featuring a unique design that allows for easy expansion and modification, they are well-suited to our way of life. Through the construction of these homes, we can create a large amount of shared housing for people, ensuring that all have a roof of their head and a warm mealing waiting for them after a long day on the saddle."
  htm_education_title: "A Literate People"
  htm_education_desc: "Education has always been a cornerstone of our society, with many of our most prominent leaders and thinkers being well-educated in a variety of subjects. Unlike in other realms, we broke down the barriers to education early on, allowing people of all classes and backgrounds to access knowledge and learning. With our recent expansion and the influx of new people, we have a chance to further expand our educational system, providing more opportunities for people to learn and grow. We must invest in schools, universities, and libraries, ensuring that our people have access to the resources they need to succeed in the modern world."
  htm_kyiv_collegium_title: "Kyiv Collegium"
  htm_kyiv_collegium_desc: "The Kyiv Collegium is a prestigious institution of higher learning in our realm, known for its rigorous curriculum and distinguished faculty. It has produced many of our most prominent leaders and thinkers, attracting some of the leading scholars of the Orthodox world away from great cities like Turnovo, Veligrad, and Constantinople. With our strong emphasis on the pursuit of knowledge and already established educational infrastrucutre, we have a chacne to further the status of the Collegium as one of the foremost institutions of higher education in the known world. Let us endorse and patronize the Collegium, providing it with the resources and support it needs to continue producing great minds and leaders for our realm."
  htm_hetman_monopoly_title: "Hetman's Monopolies"
  htm_hetman_monopoly_desc: "With the military council's control over all affairs of the state, the Hetman has taken it upon himself to assert control over key sectors of industry and agriculture to feed our army and fund our expansion. While this has been met with some resistance from the merchant class and the elite, it has also been crucial to our success in maintaining our independence and sovereignty. Let us cement these monopolies as a key part of our economic policy, ensuring that we have the resources we need to continue our expansion and protect our people from foreign threats."
  htm_levy_customs_title: "Levy Customs"
  htm_levy_customs_desc: "Between each Host, we have granted them a certain level of independence in their economic policies, leading to the Hetman and Military Treasury suggesting the creation of an internal customs union for the purposes of regulating travel, transit, and trade amongst the varied industries and trades of the land. It would provide us with a valuable tax base, while also ensuring that the different avenues of reveune can be equally distributed amongsts the hosts, guaranteeing that no one is left behind in the rapid development of our nation."
  htm_military_council_title: "Cossack Council"
  htm_military_council_desc: "Supreme power across all branches of the government line within the General Cossack Council, headed by our very Hetman. Invested with this supreme power by the General Council, composed of Cossacks, townspeople, clergy, and even the peasants, his election is a true representation of populist sentiment. We must uphold the role and power of the General Cossack Council, whose faith and support of the Hetman ensure the stability and security of our nation."
  htm_power_hetman_title: "Power of The Hetman"
  htm_power_hetman_desc: "As our bureacracy expands, and so do the opinions and voices of our people, the powers of the Hetman have become an increasingly debated issue. Those focused on expansion and our struggle for sovereignty have steadily pushed to delegate more and more power to the Hetman, which some argue twist our the founding ideals of the first Cossacks into some contorted 'Imperial Democracy', where the Hetman acts more like King than an elected official. Others push to loosen and check the powers of held by our leader, under the guise of protecting the people and securing the peoples role in the direction of our nation. The time has come to decide where the role of the Hetman will lie in history. Will his infinite wisdom and tatical brilliance guide us to a  idyllic future? Or will the will of the people reign supreme over the temptation of authoritarianism?"
  htm_assign_colonels_title: "Assign Colonels"
  htm_assign_colonels_desc: "Colonels are the governors of each regimental district that composes the Hetmanate. They act as the supreme miitary and civil authority within thier respective districts, each one personally appointed by the Hetman himself. They operate as an extension of his will, and in that regard, as arbitors of the people. We must expand our training regiments and educational programs for these skilled officers and bureacrats, ensuring a healthy class of adminstrators that can support the governance of our growing nation for years to come."
  htm_army_with_state_title: "Army With a State"
  htm_army_with_state_desc: "While the Kozatstvo expouses freedom and liberty, it has always been backed by fire and sword. The martial spirit of our people is known across Eurasia, striking fear into all those who dare oppose us. It is these principles that we have structure every facet of our society around, organizing as a unit along military lines. For we may act as a some kind of modern state with a vast bureacracy, we are nothing more than an army with a state. Whose economy is built up on production for war, where politics and foreign policy decided on the field of battle, and societal status based upon feats of bravery in batttle. This must be ingrained in our people, for there will always be a larger threat that seeks to snuff out the light of liberty that burns bright within our hearts."
  htm_starshyna_title: "The Starshyna"
  htm_starshyna_desc: "The Starshyna, our Council of Officers, is an important advisor body composed of high ranking commissioned officers in the Cossack army. While at first an integral compontent of our government,t he Starshyna have increasingly grown to act like nobles of yore, consolidating landownership, social status, as well as certain privileges and rights not granted to other lower-ranking Cossacks. We must find a way to preserve the balance of power between the Cossack Council and the Starshyna enshiring the status of the noble Cossack within our society, but preventing them from falling to the taint of greed and megalomania."
  htm_patrons_of_arts_title: "Patrons of The Arts"
  htm_patrons_of_arts_desc: "While their inclination toward wealth and power shines bright, the Starshyna have been the catalyst for a cultural golden age in Cossack society. They patronize travelling Diaks, students of the collegiums across the realm, who perform poetry, plays, and other popular acts. They have an intense passion for music, leading to the widespread growth of traditional folk music, dance, and church singing. Intellecutal pursuits, specifically the strategic game of chess, is used to train and maintain their tactical cunning in preparation for their return to the battlefield. Learning from those of the East, and keeping in line with our military preparedness, they have become patrons of the martial arts, leading to new forms of combat and melee to spread across the land. While we are weary of their growing influence, this movement of cultural flowering can only be encouraged."
  htm_star_business_title: "Mercantile Class"
  htm_star_business_desc: "While the Starshyna maybe an important estate within our society, the mercantile class are also key to economy, yet face many roadblocks from Starshyna control and monopolies over key industries. Through careful diplomacy, we can promote cooperation and partnership between the two classes to help grow key sectors of the economy, and make them slowly and unwittingly give up some of their economic power to a third class, balancing the scales between the estates. This is a crucial step in maintaing the balance of power."
  htm_fate_elected_cossacks_title: "Elected Cossacks"
  htm_fate_elected_cossacks_desc: "The term 'Cossack' when it refers to social class is a wide and all encompassing term to refer to many of our people. While the Starshyna, as rich and powerful as they may be, are referred to as Cossacks, there lie many more who lack the rights, privileges, and wealth they have. One special class of these aforementioned people are the Elected Cossacks. In exchange for tax exemption and other privileges above that of the landless, they were to be the first to be called to arms when the military situation dictated it. Due to their well-to-do status when compared to that of the Cossack Helpers or even the peasants, they were required to supply their own arms, horses, and supplies for military expeditions. But with their increasingly level of service to the Hetman, the question of their status has arisen. The Starshyna, seeking to preserve and insulate their herditary power, petition the Hetman to dissolve this strange and incongruous social class. While many prominent Elected Cossacks, as well as other lower Cossacks on the fringes of the social strata, have implored the Hetman to formalize their rights and elevate them to a level equal to that of the Starshyna. The decision must be made soon, for this kind of stratification is what lead the original Cossacks to flee the social structure of their medieval overlords..."

