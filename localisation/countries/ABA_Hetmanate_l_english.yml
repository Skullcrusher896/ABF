  ##### ESTATE PRIVILEGES #####
  ABA_UNLOCK_BELYANA_ESTATE_PRIVILEGE: "§GUnlocks§! the '§YBelyana Trade§!' [Root.GetBurghersName] Estate Privilege, giving the following effects:\n§G+1§! Merchants.\n§G-10.0%§! Ship Cost.\n§G-10.0%§! Shipbuilding Time.\n\nProvinces along the §YDon§! and §YVolga§! rivers will receive the following modifiers:\n§G+0.1§! Monthly Prosperity Growth.\n§G+10.0%§! Trade Value Modifier.\n§G+0.5§! Local Goods Produced."
  estate_burghers_htm_belyana_trade: "Belyana Trade"
  ABA_estate_burghers_htm_belyana_trade: "Belyana Trade"
  ABA_estate_burghers_htm_belyana_trade_desc: "With our control over the Don and Volga rivers, we have secured control over the vital river passages that link our major ports along the Black Sea and our land routes to the West to the booming lumber trade of the North. With the long journey these traders take, a new form of transportation has emerged: the Belyana. These massive wooden ships, built without any plans or tools, are used to transport timber down river, being entirely composed of their cargo. Disassembled upon arrival, and built once again with new materials once enough timber has been gathered upstream, these innovative yet simple ships are crucial to getting vital building material to the vast lands of the Steppe for new Cossack settlements, and for export to the West, with this lumber being used in  construction projects and shipbuilding. By nuturing the Belyana trade, we can ensure our economic independence and secure our place as a major player in the regional economy."
  unlocked_privilege_estate_burghers_htm_belyana_trade_tt: "Has completed the 'Belyana Trade' Mission."
  estate_burghers_htm_belyana_trade_gt: "Provinces along the §YDon§! and §YVolga§! rivers will receive the following modifiers:\n§G+0.1§! Monthly Prosperity Growth.\n§G+10.0%§! Trade Value Modifier.\n§G+0.5§! Local Goods Produced."
  estate_burghers_htm_belyana_trade_revoke: "'§YBelyana Trade§!' will be removed from every owned province along the §YDon§! and §YVolga§! rivers."
  estate_cossacks_aba_htm_hosts_of_steppe_mod_rt: "The modifier '§YHosts of the Steppe§!' is removed from all §YSteppe§! provinces."
  aba_htm_upgrade_prime_herding_rights_gt: "§G+25.0%§! Local Tax Modifier in all §YSteppe§! provinces\n§G+10.0%§! Local Production Efficiency in all §YSteppe§! provinces\n§G+10.0%§! Local Friendly Movement Speed in all §YSteppe§! Provinces"
  aba_htm_upgrade_prime_herding_rights_mod: "Pastoral Revolution"
  aba_htm_upgrade_prime_herding_rights_rt: "The '§YPastoral Revolution§!' Modifier is removed from all §YSteppe§! provinces."
  ABA_estate_cossacks_htm_starshyna_council: "Starshyna Council Rights"
  ABA_estate_cossacks_htm_starshyna_council_desc: "The Starshyna, are becoming increasingly influential in our ever-changing political landscape. They have become a sort of nobility all but in name, and it is important we recongize and outline their rights and privileges before they fall to the same temptations as petty nobles."
  ABA_UNLOCK_STARSHYNA_ESTATE_PRIVILEGE: "§GUnlocks§! the '§YStarshyna Council Rights§!' [Root.GetCossacksName] Estate Privilege, giving the following effects:\n§G-5.0%§! Military Advisor Cost.\n§G+1§! Leaders Without Upkeep.\n§G-0.5%§! Yearly Army Tradition Decay."
