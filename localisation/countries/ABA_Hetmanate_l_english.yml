  htm_first2: "Empower the Cossack Rada"
  htm_first2_desc: "Despite being mostly military in nature, the Cossack Rada is in charge of the administration of our territory. To increase the effectiveness of this institution, the rights of the assembly will be greatly expanded and empowered."
  htm_fourth2: "Hetman's Authority"
  htm_fourth2_desc: "Elected for life by the council of the elders, the Cossack Hetman is the head of the state of the Cossack Hetmanate. Being responsible for the well-being of the entire country, it should be in our best interest to ensure that the most capable person who is able to protect the Hetmanate is always elected."

