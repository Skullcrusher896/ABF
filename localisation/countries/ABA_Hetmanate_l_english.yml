  #### Holy Orders ####
  aba_htm_regimental_district_short: "District"
  aba_htm_regimental_district_full: "Regimental District"
  aba_htm_chyhyryn_order: "Chyhyryn Regiment: The Hetman's Guard"
  aba_htm_chyhyryn_order_desc: "The Chyhyryn Regiment are one of the most elite and politically influential regiments in the entire host. Taking their name from the city of Chyhyryn, lying outside the great city of Kyiv, they have been essential in campaigns across the Western Frontier, as well as in the adminstration of these wealthy new lands. Due to their early contributions to the foundations of our state, they have grown to rule over large estates and hold many powerful positions within the Sich, even offering their most fearsome warriors as personal guard's for the Hetman himself. It would be wise to grant these cunning and experienced Cossacks more appointments within the adminstration."
  aba_htm_poltava_order: "Poltava Regiment: The Eastern Vanguard"
  aba_htm_poltava_order_desc: "The Poltava Regiment are a hardy group of fierecly indepedent Cossacks, hailing from their namesake city on the left bank of the Dnipro. Composed of many Elected Cossacks and having the support of a massive peasant population descended from emancipated Serfs, they have firmly established themselves as crusader for liberty and individual sovereignty. In addition to that, they were some of the first Cossacks to descend upon the Eastern Frontier, an experience that would shape the nature of their unique and militant ethos forever. These two factors combined have lead to them lead some of the largest and most experienced forces in all the [Root.GetName], being key in both the defense and expansion of the realm. Given their military strength and tactical intitution, it would be in our best interest to grant them control over areas of conflict or potential expansion, where victory is crucial to the survival of our nation."
  aba_htm_nizhyn_order: "Nizhyn Regiment: Economic Powerhouse"
  aba_htm_nizhyn_order_desc: "The Nizhyn Regiment, originating from the once powerful principality of Chernihiv, control the wealthiest and most populous districts in our lands. Through careful investment and cooperation with the Gorozhane, they have become the most industrialized and productive unit in our realm, holding a monopoly over manufactured goods and trade routes that control the flow of wealth from the East to the West. But that's not to say they've neglected their armed forces either, fielding some of the largest and well equipped cossacks known to history, defending their wealth with uncompromising discretion. It would be in best interest to grant these shrewd and perspicacious moguls of industry control over newly developing districts, allowing them to reach their full potential."
  aba_htm_lubny_order: "Lubny Regiment: Architects Of the East"
  aba_htm_lubny_order_desc: "Formed during a recent adminstrative reshuffle, the regiment of Lubny has proven themselves to be adept adminstrators and urban planners. Due to the large amount of landed Cossacks that compromise the makeup of the district, they've spent time carefully planning stanitsas and urban centers, becomnig master architects and city planners, building sprawling cities and villages that maintain a careful balance between respect for the land and the shifting economic landscape of the world as whole. It would be wise to support these developmental efforts, and create a strong network of infrastructure prepared for further expansion."
  aba_htm_starodub_order: "Starodub Regiment: The Border Watch"
  aba_htm_starodub_order_desc: "Developing along our borders with the princes of Rus', the Starodub Regiment has become crucial in maintaining an active and prepared defense against the depositic forces of the North and East. Similar to the Poltava Regiment in this way, they push the Northern frontier instead of the Eastern, seeking to safegaurd the freedoms we have established at home while also liberating those who have long languished under the rule of the Kniazya. Supporting them is crucial to maintaining the tenious situation that runs along order borders with more well-established states, and will deter any would-be invader from entering our lands."
  aba_htm_chernihiv_order: "Chernihiv Regiment: The Enlightened District"
  aba_htm_chernihiv_order_desc: "The Chernihiv Regiment, once toiling under the rule of the Kniaz, now thrives under our rule. With their newfound freedom and independence, a strong literary culture based around monastic schools has appeared, birthing a new intelligentsia that has begun to settle across the land. While still skilled warriors, they practice with both the pen and the sword, making them inspiration figures in the hearts and minds of young Cossacks, our equivalent to a Western Renaissance man. It would be in our best interest to support this cultural flowering, creating a strong class of councilmen, clergymen, and enlightened individuals."
  ABA_HTM_CHERNIHIV_ADD_EFFECT: "Gain §G0.01§! Republican Tradition for §Yevery province in the state§!."
  ABA_HTM_CHERNIHIV_REMOVE_EFFECT: "Lose §R0.01§! Republican Tradition for §Yevery province in the state§!."
  ABA_HTM_STARODUB_ADD_EFFECT: "Gain §G0.01§! Army Tradition for §Yevery province in the state§!."
  ABA_HTM_STARODUB_REMOVE_EFFECT: "Lose §R0.01§! Army Tradition for §Yevery province in the state§!."
  ABA_HTM_UNLOCK_MORE_REGIMENTAL_DISTRICTS: "§GUnlocks§! the §YLubny§!, §YStarodub§!, and §YChernihiv§! Regimental Districts."
  ABA_HTM_REGIMNETAL_DISTRICTS_BUFF_YES: "£yes£ If we complete this mission while we while we have established §YRegimental Districts§! in §Y50§! provinces, The Minimum Local Autonomy Increase in provinces controlled by §YRegiments§! will be reduced to §Y+2.50§! and establishing §YRegiments§! now grants assigned areas §G-10.0%§! Province Governing Cost."
