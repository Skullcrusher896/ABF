  ###################### Government Reforms #############
  aba_hetmanate_buffed: "Cossack Hetmanate"
  aba_hetmanate_buffed_desc: "The free Cossacks of the Wild Fields are ruled by a military council presided over by an elected Hetman."
  aba_htm_kurin_buffed: "Kurin Nadel"
  aba_htm_kurin_buffed_desc: "The Kurin, our most basic division of land, is centered around a barracks where we keep our supplies and its own treasury. By granting nadel, or allotments, to the kurins and the Cossacks that compose them, we can break the lingering power and influence of the old nobility, and create a more direct relationship between the Hetman and the people."
  unlock_aba_htm_kurin_buffed_tt: "§GUpgrades§! the §YExpand the Kurin§! §MTier 7§! Government Reform to the §YKurin Nadel§! §MTier 7§! Government Reform, giving the following effects:\n\n§G-10.0%§! Core Creation Cost\n§G+10.0%§! Production Efficiency\n§G-10.0%§! Development Cost Modifier.\n\nThis reform includes the following Government Mechanic:\nSeizing Land from §YEstates§! does not trigger rebels"
  aba_htm_refuge_buffed: "Refuge Against Tyrants"
  aba_htm_refuge_buffed_desc: "Our society's foundation was laid by those seeking freedom from oppressors; noble and commoner alike who refused to bow to cruel and uncompromising masters. Their desperate plight to break the shackles of tyranny is something that we shall never forget. Through education and scholarly pursuit, we arm ourselves with the knowledge of our natural rights and dispel the false claims of authority these tyrants spread. Turning this wisdom into a weaponized discourse in the intellectual war against the despotism untruths espouses."
  unlock_aba_htm_refuge_buffed_tt: "§GUpgrades§! the §YRefuge Against Tyrants§! §MTier 2§! Government Reform, granting the following additional effects:\n\n§G-5.0%§! Idea Cost\n\nThis reform includes the following Government Mechanic:\nProvinces with a §YPatriarch§! gain §G+10.0%§! Institution Spread"
  aba_htm_urbanization: "Embrace Urbanization"
  aba_htm_urbanization_desc: "While we have always had a spirtual and almost ancestral tie to the land and a strong affinity for our agrarian lifestyle, times change. The world is on the precipice of great change, as mechanization and manufacturing have flipped the economic balance on the world on its head. Once poor nations now thrive, taking the have nots and turning them into the haves through their surpluses of cheap labor gathered around rising cities, where factories and mills out-produce even the most skilled and established artisans and guilds. The writing is the wall, and even though we try our hardest to preserve our way of life, we cannot stop the growing tide of peasants and wealthy Cossacks who grow attracted to city life—seeking new economic opprotunities and social standing. If we cannot beat them we must join them, and ensure our economic sovereignity through investment and careful planning of urban center, asserting control over key industries and trade hubs."
  unlock_aba_htm_urbanization_tt: "§GUnlocks§! the §YEmbrace Urbanization§! §MTier 8§! Government Reform, giving the following effects:\n\n§G+1§! Merchants\n§G+10.0%§! Province Trade Power\n§G-15.0%§! Development Cost Modifier.\n§R-10.0%§! National Manpower Modifier.\n\nThis reform includes the following Government Mechanic:\nEvery owned province with §Y25§! or more development gets the following bonuses:\n§G+15.0%§! Local Production Efficiency\n§G+15.0%§! Local Tax Modifier"
  aba_htm_agrarianism: "Preserved Agrarianism"
  aba_htm_agrarianism_desc: "Despite the growing economic pressures arising from this movement of 'proto-industrialization', we remained steadfast in our ways, and infact, developed an even deeper connection and bond to the land. Rather than crowd our people into the filthy and cramped slums of growing urban centers and subject them to thankless and tireless work in the manufactories, we have encouraged them to return to the land. For toiling in the sun, harnessing the bounty gifted to us by our generous Batkivshchyna, and resting after a hard days work on soil we earned through our blood, sweat, and tears is the way it always meant to be. While we may not possess the same industrial capacity as our enemies, the spirit of the people will carry us forward in these uncertain times."
  unlock_aba_htm_agrarianism_tt: "§GUnlocks§! the §YPreserved Agrarianism§! §MTier 8§! Government Reform, giving the following effects:\n\n§G+10.0%§! Production Efficiency\n§G+10.0%§! Goods Produced Modifier\n§G+10.0%§! National Manpower Modifier.\n§R+0.075§! Global Autonomy Change.\n§R+5.0%§! Technology Cost.\n\nThis reform includes the following Government Mechanic:\nEvery owned §YGrain§! producing province gets the following bonuses:\nLocal Production Efficiency: §G+125.0%§!\nLocal Unrest: §G-1.00§!"
  aba_htm_mixed_economy: "Dual Economy"
  aba_htm_mixed_economy_desc: "Despite the pressures we faced both internally and externally, we have managed to achieve balance in our economic policy. The peasants continue to toil the fields along the banks of the Dnipro, but with higher efficiency, using the latest technologies and innovations to harness the full potential of the land. Resources flow from the countryside into growing urban centers, supporting the growth of manufactories and specialized vocations creating the foundation of our industrial base. This system, an economy caught between two worlds, with one foot in the past and one in the future, seamlessly linking the two into a fair and equitable system of commerce unlike any other in the world."
  unlock_aba_htm_mixed_economy_tt: "§GUnlocks§! the §YDual Economy§! §MTier 8§! Government Reform, giving the following effects:\n\n§G-5.0%§! Technology Cost\n§G+10.0%§! National Tax Modifier\n§G+10.0%§! Global Trade Power.\n§G+1§! Global Possible Number of Buildings.\n\nThis reform includes the following Government Mechanic:\n§YIron§!, §YGold§! and §YCopper§! producing provinces will receive §G-10.0%§! Local Development Cost and §G+10.0%§! Local Goods Produced Modifier."
  aba_htm_regimental_rule: "Regimental Districts"
  aba_htm_regimental_rule_desc: "The tumultuous reality of the Cossack way of life necessitates military readiness at all times. Reflecting our state of constant conflict and militant culture, we have created a new form of adminstration based on the principles of preparedness and rapid mobilization. Rather than delegate the rule of newly organized districts to lowly bureacrats or enthrone new noblemen, our talented commissioned officiers can take the reins, acting as the supreme military and civil authority in their respective regimental districts. The choice of appointing them or leaving their elections open to the people remains a debated topic, but for now the Hetman has decided to pursue a balance between the two. Leaving appointments reserved for strategically and economically vital districts, and election for those that are away from the frontiers, deep within our borders."
  unlock_aba_htm_regimental_rule_tt: "§GUnlocks§! the §YRegimental Districts§! §MTier 6§! Government Reform, granting the following effects:\n\n§G-10.0%§! Regiment Manpower Usage\n§G+10.0%§! Defensiveness\n§G+10§! Max Absolutism.\n§G+100§! Governing Capacity.\n\nThis reform includes the following Government Mechanic:\n§GUnlocks§! access to the §YChyhyryn§! Regiment, §YPoltava§! Regiment, and §YNizhyn§! Regiment Local Organizations."
  aba_htm_cossacks_registry_reform: "Cossack Registry"
  aba_htm_cossacks_registry_reform_desc: "Cossacks who occupy territories within our domain are skilled riders, masters of the saddle and a powerful asset for our military. The Cossack registry will permanately institutionalize their role in our administration and outline the various rights and privileges of the various strata of Cossack Hosts and individuals within our society."
  unlock_aba_htm_cossacks_registry_reform_tt: "§GUnlocks§! the §YCossack Registry§! §MTier 4§! Government Reform, granting the following effects:\n\n§G+15.0%§! Special Unit Force Limit Modifier\n§G+15.0%§! §Y[Root.GetCossacksName]§! Loyalty Equilibirum Modifier\n§R+10.0%§! §Y[Root.GetCossacksName]§! Influence Modifier\n§G+2§! §Y[Root.GetCossacksName]§! Max Privileges.\n\nThis reform includes the following Government Mechanics:\nRecruiting §OCossack§! Regiments now grants §G+0.001%§! Army Professionalism.\n'§Y[Root.GetCossacksName]§!' Estate Privileges now have §G-20.0%§! less Max Absolutism Impact."
  aba_htm_council_buffed: "Election by Military Council"
  aba_htm_council_buffed_desc: "Our Hetman is elected to his post by an Ataman military council known as the Rada. This allows us to ensure that only the most experienced commander can lead our people, and also brings military matters to the forefront."
  aba_htm_cossack_meritocracy: "Cossack Meritocracy"
  aba_htm_cossack_meritocracy_desc: "By enshirning the rights and privileges of the lower strata of Cossacks, who once languished under the growing power of the Starshyna, we have ensured that freedom will reign above all else. The spell cast by the Starshyna that once bound the mechanisms of government has been broken, as waves of new, talented, and feriouscly patriotic enter the ranks of our adminstration, expericening once unseen social mobility. No longer are we trapped under the weight of greedy and power-hungry petty nobles, for we march foward into a bright new age!."
  unlock_aba_htm_cossack_meritocracy_tt: "§GUnlocks§! the §YCossack Meritocracy§! §MTier 12§! Government Reform, granting the following effects:\n\n§G+1§! Yearly Republican Tradition\n§G-2§! National Unrest\n§G+33.0%§! Parliament Debate Backing Chance\n§R-15§! Max Absolutism.\n\nThis reform includes the following Government Mechanics:\nEnables §YParliament§!.\nReduces the Parliament Bribes cost by §G50%§!."
  aba_htm_starshyna_oligarchy: "Starshyna Oligarchy"
  aba_htm_starshyna_oligarchy_desc: "The Starshyna have won out, forming cementing their autocratic and oligarchic rule over our once free people. Disenfranchised and institutionally pushed out of government, the Elected Cossacks and other lower strata find themselves subordinate to the whims of the Starshyna. While we may have sacrified our freedom, our soveregnity will be secure..."
  unlock_aba_htm_starshyna_oligarchy_tt: "§GUnlocks§! the §YStarshyna Oligarchy§! §MTier 12§! Government Reform, granting the following effects:\n\n§G+10.0%§! Max Absolutism Effect\n§G+10§! Max Absolutism\n§G+0.5§! Yearly Absolutism\n§R-1§! Yearly Republican Tradition\n\nThis reform includes the following Government Mechanics:\nA §YGeneral§! becomes ruler when the current ruler dies\nDisallows §YElections§!\nElections only occur when ruler dies."



  ###################### Government Mechanics #############
  ability_cossack_militarization_mechanic: "Kozatstvo"
  cossack_militarized_society: "Reification of Kozatstvo"
  cossack_militarized_society_desc: "Kozatstvo, known to those in the West as Cossackdom, is a newly emerging term used to describe the unique spirit of our people. Free from the shackles of serfdom and the tyranny of kings, we conquered untamed and hostile lands with our unwavering yearning for freedom. We enshired and nutured the seldom found privileges of free expresssion and open civic particpation. A pauper can turn himself into a prince with the unparalleled open economic opprotunites that lay before him. All of this protected by our innate martial prowess and traditions, whose tales spread from the Urals to the Pyrenees, striking fear into all those that dare seek to rip this way of life from us. As we've continued to expand, and liberate the oppressed peoples of the East, we are witnessing the reificaiton of this concept—once a distant dream of those whose first settled the Wild Fields, fleeing the wraith of the Khan and the despotism of the Princes. We are witnessing its realtime actualization into a distinct and inerasable socio-political identity, one that our people will fight for with a patriotic like no other."
