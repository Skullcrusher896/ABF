################################## Country Events ##################################

################################## Missions ##################################
lva_united_with_pruthenia_title: "Unite With Pruthenia"
lva_united_with_pruthenia_desc: "Our Pruthenian brothers are fierece and unreleneting warriors of Perkunas, shielding one of our Faith's holiest sites against the encroaching Christian threat. The Warrior-Duke of Pruthenian must realize that if we are to survive the coming storm of Christian fury that is closing down around us, we must stand united. But the nature of Baltic rulers is not one of cooperation even though we may be brothers in faith. It is time we sally forth and meet them on the field of battle to settle the question of Baltic leadership once and for all!"
lva_revitalize_visby_city_title: "Revitalize Visby City"
lva_revitalize_visby_city_desc: "With the defeat of the insidious Vikings and their Pirate underlings, we have gained control of the mighty stronghold of Visby City. The city is renowned throught the Baltic for its strong defense of Gotland's interior, as well as its strategic and valuable trade port. As we continue to consolidate our hold over the Baltic and its sea, it would be nothing other than unwise to ignore a significant investment into the city."
lva_punish_crusaders_title: "Dislodge the Crusaders"
lva_punish_crusaders_desc: "The city of Danzig is vital trade hub along the Baltic Sea, yet it remains in control of the Hanseatic League. While many of guilds are composed of Baltic Germans, we can not allow the Christian menance to put pressure on us so close to home. We must march onward to Danzig, and expel the crusaders from our coasts!"
lva_baltic_trade_metropolises_title: "Baltic Trade Metropolises"
lva_baltic_trade_metropolises_desc: "With the proper support, many settlements around the Baltic have the potential to become beacons of civilization and hubs of trade. Let us invest and develop these settlements, nuturing their growth, so that we may one day become the envy of Europe!"
lva_ruthenia_title: "The Heart of Ruthenia"
lva_ruthenia_desc: "Perkunas be blessed! For he has guided our warriors to victory in our initial invasion of Rus'. While we continue to make gains, we should turn our attention toward the Heart of Rus': the lands of Ruthenia and the Mother of Cities, Kijevas. By cementing our control of these lands, we can establish ourselves as the true heirs of the East, and forge a mighty empire on the ruins of the old."
lva_novogorod_title: "Conquer Novgorod"
lva_novogorod_desc: "The Great Veche of Republic of Novgorod has already succumbed to our intitial invasion of East. While we have seized the borderlands, their lives a vast wealth of timber, rivers, and fur throughout the rest of its holdings. In due time, it will be ours..."
lva_atslegpils_title: "Found Atslegpils"
lva_atslegpils_desc: "At the mouth of the Neva river lies the Russian city of Oreshek, a key chokepoint for both trade and potential invaders from the North. In order secure our border and assert our dominance over the local Russian population, the Duke has order the construction of a new fortress, 'Atslegpils' or 'Key Fortress', named after its key position at the mouth of Neva river. This new settlement will be instrumental in the establishment of our authority."
lva_control_fur_trade_title: "Control the Fur Trade"
lva_control_fur_trade_desc: "With the destruction of Novgorod, its vast forests, winding rivers, and plentiful trapping grounds are now open to us. We must work with the Guilds to harness this land of all it has. Fur is seen as a luxury in Western markets, and while we may be in a conflict of faith, no one ever said their money wasn't good here..."
lva_crush_horde_title: "Crush the Horde"
lva_crush_horde_desc: "The time has come to crush the perfidious Hordes of the East that once held all of Rus' under their yoke. Rus' now stands strong under our leadership united by faith, and will not allow folley of the Ruthenians to be repeated again. While they pray to the Great Sky God, he has no match for the mighty warriors of Perkunas!"
lva_seize_pomerania_title: "Seize Pomerania"
lva_seize_pomerania_desc: "Although they are fellow pagans, the Pomeranians have proven far too weak to seriously hold back the Christian advance. We must take up the torch of Pagan resistance, and that should begin with conquering Pomerania."
lva_control_wendia_title: "Control Wendia"
lva_control_wendia_desc: "While they once valiantly defended pagan borders from the Germans, the current state of the Wends is pitiful. Divided and bickering, we can no longer trust them to resist, if we are to ever push back against the Christians, the Wends must be subjugated."
lva_baltoscandia_title: "Unite Baltoscandia"
lva_baltoscandia_desc: "The Pagans of the North have always had much in common with each other, yet we remained divided by faith, and the scheming machinations of the Christian Crusaders. Today that all ends. WE have unified the Pagans of the North, and with that nothing can stand in our way, as we loom over Europe like an encroaching plague!"
lva_caucasia_title: "Southern Bulwark"
lva_caucasia_desc: "As we continue to push East and South, we find ourselves facing myriad new threats. From unknown faiths to great empires, Perkunas will guide us to victory in these uncertain times, but it doesn't mean that defence is any less valuable. We must secure the mountain passes of Caucasia and constructed a series of defences that can with standard the might of these new threats."
lva_central_asian_expediton_title: "Strike the Turkmen"
lva_central_asian_expediton_desc: "We have discovered the lands of the Turkmen, a fiercely independent people who have organized themselves into a series of tribes, hordes, and upstart kingdoms, relying heavily on their own prowess as mercenaries. Seeing their skill as an invitation to test their mettle, many of our Warrior-Dukes as seeking to organize an expedition into Central Asia to combat this potential new threat, and fold the Turkmen into our employ for future campaigns."
lva_siberian_control_title: "Settle Siberia"
lva_siberian_control_desc: "The East still remains undiscovered, yet our initital surveys and settlement of Siberia has discovered untold new wealth. Gold, iron, copper, and much more at to be found in the hills, forests, and rivers of the seemingly endless Siberia Wasteland. We must continue to push East until we found out what's on the other end..."
lva_manchurian_crown_title: "Manchurian Crown"
lva_manchurian_crown_desc: "We have reached the Eastern edge of Siberian, revealing to us a whole new world of riches and challenges to face. In fact our greatest challenge yet lies here, the Empire of China, with its tight control over a vastly wealthly region known as Manchuria. Perkunas has led to us to this very moment, a time to test our might against the greatest foe we have faced yet!"
lva_drain_marshes_title: "Drain the Marshes"
lva_drain_marshes_desc: "Another major issue with the Baltics is the sheer amount of marshes that spread across our land. The terrain is unfavourable for humans and clearing marsh is not cheap in any way. But we must persevere to ensure that our people can expand and prosper. The Marshes of the Baltic will bow to our industrial might and make way for new cities across the land."
lva_new_farmland_title: "New Farmlands"
lva_new_farmland_desc: "Our clearing of the marshes has revealed new arable land that can support our growing nation. We must invest in the cultivation of these new farmlands, creating a new generation of communal land for our people to share."
lva_valmiera_title: "Expand Valmiera"
lva_valmiera_desc: "Our capital city of Valmiera has never been a sight to be hold. Founded by a mix of Baltic Germans and Livonians, their has also been a fusion of the two cultures present on its streets and within its architecture. It is time for us to take this a step further, combining the meticulous city planning of the Germans with the practicality and function of Baltic settlements. We must make this a city befitting of a rising power!"
lva_thunderer_title: "Awaken the Thunderer"
lva_thunderer_desc: "Our chief god Perkunas demands we vanquish the Christian heathens and purge our sacred land of their barbarian ways. Let us not disappoint."
lva_sword_of_perkunas_title: "Sword of Perkunas"
lva_sword_of_perkunas_desc: "While we have assured Perkunas's favor, there are more enemies of the faith that still draw breath. For too long Perkunas has endured much humiliation at the hands of all our enemies, this must end forever after."
lva_perkunas_shield_title: "Shield of Perkunas"
lva_perkunas_shield_desc: "We have slaughetered in the name of Perkunas, but we must also make sure we can probably defend his followers and the land of his faith. We will become the Shield of Perkunas!"

