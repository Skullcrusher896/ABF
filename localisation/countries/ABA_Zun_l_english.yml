l_english:
################################## Country Events ##################################
aba_zun_event.1.t: "Our Destiny"
aba_zun_event.1.d: "Through the strength found in our Faith we emerged victorious, and now our humble nation lies at a crossroads. As we turn towards the annals of history for an answer, we find ourselves at the confluence of many different cultures and faith, each one having left their own unique and unerasable impact on our society. The two legacies that stand out the most of all to advisors in our court are those of the Seleucid Empire and the Kushans. Fusing together the mixed heritages of their people, uniting them under common faith, tongue, and flag, each option has glory to be earned in their own right. While no one says we cannot pursue both, bringing the purifying flame of Zun to the heathens and heretics of the world, it would be wise to focus on one path at a time, allowing us to build our strength to its fullest, never again repeating the failures of our ancestors..."
aba_zun_event.1.a: "Let the sun set over Hindustan!"
aba_zun_event.1.b: "We shall bring the Fire of Zun to the West!"
aba_zun_event.2.t: "The Synthesis"
aba_zun_event.2.d: "With our conquest of India, we have come to embrace the rich and diverse culture of the subcontinent. Our people have adopted many Indian customs and traditions, and we have even begun to incorporate Indian art and architecture into our own. This fusion of cultures has created a unique and vibrant society that is unlike anything seen before. We have also embraced elements of the Indian religion of Hinduism, which has become a major part of our spiritual life. The synthesis of Zunist and Indian cultures has led to a new era of prosperity and enlightenment for our nation, and we are excited to see what the future holds..."
aba_zun_event.2.a: "The §YSynthesis§! of §YAfghan§! Culture and §OIndian§! cultures begins..."
aba_zun_event.2.b: "While we weather their influence, we turn toward our §YPersian§! roots..."
aba_zun_event.3.t: "Global Purification"
aba_zun_event.3.d: "Our faith has guided us to victory, and now it is time to spread its light to the rest of the world. We will embark on a massive campaign to crush the false gods that many of these heretics and heathens pray to. We've already destroyed their holy sites, but this is simply not enough to show them the falsity of their ways. We will send missionaries to every corner of the globe, preaching the truth of Zun and converting those who are willing to listen. For those who refuse, we will show them the true power of our faith through force if necessary..."
aba_zun_event.3.a: "The Zun never sets...."
aba_zun_event.4.t: "Mission Switch"
aba_zun_event.4.d: "We are able to switch between different mission trees by choosing an option below. If there is only one option, that means we haven't unlocked other trees yet"
aba_zun_event.4.a: "§OIndian§! Branch"
aba_zun_event.4.b: "§YPersian§! Branch"
aba_zun_event.5.t: "Choose Country Culture"
aba_zun_event.5.d: "We have two options to for our country's color:"
aba_zun_event.5.a: "Rob §PPurple§!"
aba_zun_event.5.b: "Zunbil Pearl §WWhite§!"
aba_zun_event.6.t: "Fate of The Jains"
aba_zun_event.6.d: "The Jains are a powerful yet docile force in the Indian Economy. Controlling a vast sum of wealth, many in court suggest we eleveated them to their deserve social status and openly cooperate with them, with others suggest sidelining them and pushing for their integration into our own socio-religious order. The question now lies with the [Root.Monarch.GetTitle]..."
aba_zun_event.a.a: "The Jains will serve us well!"
aba_zun_event.6.b: "It would be best for a new generation to dominate the Indian markets..."
aba_zun_event.7.t: "Fate of The Marathas"
aba_zun_event.7.d: "The Marathas are a powerful warrior caste, who much like the Rajputs, donimate the battlefields of their respective homeland. Renowned for their distinguished military accomplishments and keen aptitude for strategic planning, many in our court are debating the question of whether to integrate this caste and introduce them as a new factor within our social strucutre, or to simply fold them into the existing nobility. The question now lies with the [Root.Monarch.GetTitle]..."
aba_zun_event.7.a: "They shall serve our military council well!"
aba_zun_event.7.b: "Off with them! They have not earned their place!"
aba_zun_event.8.t: "A New Warrior Caste"
aba_zun_event.8.d: "Emerging out of a powerful fusion of cultures, a group known as the Qizilbash has emerged at the forefront of military campaigns. Descending from the Turkoman tribes that once swept through our lands, combining the military traditions of our various tribes with that of the Rajputs when they settled in the East, they have proven themselves to be a formidable military force, and are now offering their services to the crown and the light of Zun."
aba_zun_event.8.a: "Welcome Brothers! For there is much to be done!"
aba_zun_event.9.t: "Zun's Light Shines"
aba_zun_event.9.d: "With the defeat of the once mighty Seljuks, and our flag flying above their petty hovels, Zun's shining star emblazened upon it, we have emerged victorious in the West. But with our conquest of the West, we have penetrated deep into the heart of Islam and Christianity, as well as myriad other religions and minor sects that combat our efforts to bring them to the light. Many recent converts, especially those who were once noblemen or members of foreign adminstrations, having begun reinterpreting their ways of governance in through the lense of Zun's will, and have found many applicable aspects that could make this tall task much easier. Today marks the birth of a new radiant state, one taking influence from both the East and the West, all in an effort to carry out Zun's ultimate designs."
aba_zun_event.9.a: "The Zun never sets!"


################################## ZUN - India Missions ##################################
zun_india_great_conversion_title: "The Great Conversion"
zun_india_great_conversion_desc: "While we have always operated with a proclivity of syncretism towards the religions of the East, it is Zun's will that his light shine upon all who inhabit our lands, especially the heretics of the West and the godless philosophers of the East. As part of effort to stregthen the religious establishment in our country, we should invest in a massive effort to spread the light of Zun to these lands, deploying missionaries to the furtherest edges of the realm. For it is Zun's will."
zun_india_sindh_title: "Reclaim Sindhu"
zun_india_sindh_desc: "Sindhu, known by many names, but most widely recongized by its Vedic title: the land of seven rivers, is a land we have shared heritage with. Acknowledging our claims to the lands of Hindu Shahi dynasties, as well as long history of political marriages, it is nothing but our birthright to assert our claim over this rich and fertile land. With the mouth of the Indus in our hands, we have the opprotunity to monopolize trade throughout the Indus River Valley and expel the Muslim invaders once and for all!"
zun_india_port_thatta_title: "Entrepot of Thatta"
zun_india_port_thatta_desc: "Lying at the mouth of the Indus river, the humble port of Thatta is ripe for expansion and investment. Its strategic location makes it key for all trading passing from the Arabian Pennisula to the Indian Subcontinent, and also presents itself as the prime location for a major naval base, allowing us to protect our power across the seas. Traders from all over the West stop at this port, whether it be for a short or long stay, giving us vital access to new technologies and knowledge that has slowly been trickling its way out from the West. Thatta shall one of the first glorious construction projects that Zun's light brings to India!"
zun_india_restore_gandhara_title: "Revive Gandhara"
zun_india_restore_gandhara_desc: "Throughout the history of the Kushans and the Hellenistic Kingdoms that reigned in the Indo-Afghan area, Gandhara stands out as one of the most influential civilizations to ever establish itself in the region. By connecting trade routes and absoring diverse cultural influences, it became the crossroads of the Eastern and Western worlds, with its capital of Purushpura becoming one of the first major urban centers in the area. It was a hub of industry, art, and religious activity, one that could easily be resurrected under our enlightened rule."
zun_hindush_title: "Control Hindush"
zun_hindush_desc: "Hindush was the eastern most province of the Achaemenid Empire and one of the last conquests of Alexander the Great, being an important military participant in the Persian campaigns against the Greeks. It is also rich and fertile land, with a vibrant and industrious textile industry in the north of the province. We've already taken control of Sinhdu, the mouth of the Indus River, it is only natural we continue our advance upstream."
zun_mulasthan_title: "Restore Mulasthana"
zun_mulasthan_desc: "Mulasthana, also known as The City Of Gold, was once one of the most sacred pilgrimage sites in all the land. According to the Hindus, it was built as an thank you to the Sun God Surya, housing the legendary Suraj Mandir Sun Temple that was destroyed by the Muslim invaders many centuries ago. With the cadre of skilled Indo-Afghan artisans living in our lands, and the growing support of the Zunist faith, we must restore this holy city to its former glory, and wipe away the influence of the Islamic invaders."
zun_cultural_frontier_title: "Cultural Frontier"
zun_cultural_frontier_desc: "Our unique geographical position has placed at the cultural frontier of East and West, trapped between the endless influence of new religions and civilizations. Unlike others in our position, who had succumb to these overwhelming influences, we held our own, taking the best of what these influences had to offer and synthesizing it with our own, creating something completely new and ineffable. But now with a growing empire of own, it is now time for us to take the role of decision maker when it comes to the form and function of our culture."
zun_gangetic_trade_title: "Gangetic Trade Routes"
zun_gangetic_trade_desc: "The Great Trunk Road has long served as an important artery of trade, travel, and military supply. But decades of infighting between the bickering Sultanates and Maharajas of India has left this once bustling highway of commerce in a sorry state. We must invest in the restoration of this trade route, as it links our empire from East to West, ensuring a harmonious exchange of people, goods, and knowledge."
zun_pilgrims_title: "Safe Passage for Pilgrims"
zun_pilgrims_desc: "The West of India was home to many great Sun Temples throughout the centuries until the Black Banner of Islam arrived and wiped the slate clean. Unfortunately for them, they failed to snuff out the glorious light of Zun. With our rule firmly established over the West and generous patronage of the clergy, new grand temple cities have cropped up along the Indus and the coast of Gujurat, leading waves of pilgrims from across the realm to flock to these holy sites. As much as we despised the Caliphate, we can't ignore the fervor of their devotion. Securing safe passage for religious pilgrims, just as they did for those on the Hajj, would do only stregthen the word of Zun and show the heathens and heretics of our land the light of the true faith."
zun_nepal_title: "Rein in Nepal"
zun_nepal_desc: "The Nepali are highly skilled warriors, selling their swords to the highest bidder. We can no longer allow these rogue states to operate outside our borders, and we have much to gain by directly integrating this militant society. We will scale the Himalayas, and strike down the petty Maharajas of Nepal."
zun_golconda_title: "Diamonds of Golconda"
zun_golconda_desc: "The world has long heard tales of the rich diamond mines of Golconda but now this lucrative deposit has fallen into our hands. Their quality and rarity makes them the envy of the world, as foreign traders stream in with an almost unending hunger for them. We must expand these mines and establish a monopoly over the gem market, making us the largest and one of the very few suppliers of diamonds in the world."
zun_vijay_title: "City of Victory"
zun_vijay_desc: "Vijayanagar is one of the last kingdoms that stands in our way of total control over India. We must march foward and claim the so-called 'City of Victory', asserting our suzeranity over all of Southern India in the process and wiping out the last major state that challenges our authority."
zun_coromandel_title: "Subdue the Tamils"
zun_coromandel_desc: "The Tamil Kingdoms and their highly wealthy merchant guilds have proven to be a significant hurdle in our conquest of Southern India. They possses advance technology produced in tandem by a proto-industrialized society. They interfere with our trade, cutting backroom deals and working with foreigners. It is time to finally stamp out this rowdy bunch, and harness their aptitude for commerce for our own embetterment."
zun_staple_ports_title: "Staple Ports of India"
zun_staple_ports_desc: "India is the nexus of trade between the East and the West, and we must ensure that we have a strong presence in this region. We must establish staple ports in key locations, and ensure that our merchants have access to the wealth and resources of this vast and diverse land."
zun_land_of_temples_title: "Land of Temples"
zun_land_of_temples_desc: "Southern India is a pious land, filled with architectural marvels that rival even our own. While we encourage all to turn toward the light of Zun, we cannot help but show apperciation for their devotion, extend our benevolent patronage to these Hindu sites as well, helping us bring all into this new age of enlightenment."
zun_accomdate_title: "Accommodate the Rajputs" 
zun_accomdate_desc: "The Rajputs maintain significant influence despite our conquest. While we could just take care of them the old fashioned way, it would be easier and more beneficial to recruit them into our army. The Rajputs will fight for Zun and spread our light all across India."
zun_bengal_tribes_title: "The Bengali Tribes"
zun_bengal_tribes_desc: "The tribes of Bengal have long been a roadblock in our centralization of India. They resist every effort to establish some form of central adminstration or taxation system, engaging in violent rebellion. It is time we move in and crush this feeble resistance, and show this wild bunch that no one can stand against the authority and living will of Zun."
zun_uzayn__title: "Rebuild Ujjain"
zun_uzayn__desc: "Ujjain was once one of the holiest cities in all of India, and the former capital of a united Rajput kingdom. It was a vibrant center of culture and spawned many religious scholars, as well as serving as a regional capital for many empires throughout the centuries. The Rajputs have slowly warmed up to us over time, but rebuilding this great city of theirs would do wonders to cement our alliance with them."
zun_kananuj_title: "Restore Kananuj"
zun_kananuj_desc: "Kananuj, located in the center of the Gangetic plain, was one of the largest cities in all of India, with its alleged glory 'reaching toward the sky'. It was the center some of the most powerful dynasties in all of India, some of them being Rajputs. With our restoration of Ujjain, and our alliance now firmly cemented, reconstructing Kananuj and granting the Rajputs land grants and titles in the region would win them over for centuries to come."
zun_purbia_title: "Purbias Register"
zun_purbia_desc: "Throughout northern India poor Rajput farmers have taken to the use of firearms to protect themselves and to earn a living in the many armies that roam these lands. As our state grows it is becoming ever more apparent that this is a resource we must draw from. Let us ensure our army can integrate these irregulars so that we can benefit from their expertise with firearms and their experience of warfare throughout Northern India."
zun_burma_title: "Burmese Conquest"
zun_burma_desc: "To our East lies the fractured land of Burma. Filled with many small kingdoms and city states, it is ripe for the taking. Many in our cabinent suggest we should expand into this region, bringing the light of Zun to these heathens, and harnessing the wealth and resources of this land."
zun_malacca_viceroy_title: "Viceroyalty of Malacca"
zun_malacca_viceroy_desc: "The Malacca strait is the nexus of trade between the East and the West. Controlling this vital waterway will allow us to control the flow of trade, and ensure that our merchants have access to the wealth and resources of this vast and diverse land. We must establish a viceroyalty in this region, and ensure that it is well-maintained and well-protected."
zun_sunset_china_title: "Sunset of China"
zun_sunset_china_desc: "China is a large populous land, filled with many different cultres, religions, and traditions. It is a land of great opportunity, yet it is also a land of great danger. The Chinese are a proud and fierce people, and they will not hesitate to attack us if we show any sign of weakness. We must establish a strong presence, whether it be through conquest or diplomacy, only then we will end this showdown."
zun_chola_title: "Chola Legacy"
zun_chola_desc: "The Chola dynasty was one of the greatest families to ever rule over India, and they expanded their empire far beyond the subcontinent. We should replicate their conquests, and gain a foothold in Southeast Asia."
zun_tibet_title: "The Tibetan Plateau"
zun_tibet_desc: "The Tibetan Plateau is a vital strategic region to control, providing a large mountainous buffer much like our homeland of Afghanistan against any of the rising warlords in China. We should move quickly, and seizing control of this region."
zun_tcr_title: "Control Tocharia"
zun_tcr_desc: "The region of Tocharia plays a large role in the routing of the Silk Road, providing a land route for luxury goods from China to the West. It is time we assert our authority over the squabbling states that occupy this land, ensure the free flow of goods."
zun_tarim_title: "Tarim Basin Trade"
zun_tarim_desc: "For eons the wealth of the Silk road has flowed from China, through the Tarim and into our lands. However, the greedy Tocharian merchants take the lions share of the profits and leave us only scraps. This will no longer do, we must start to exert our control over this trading cities through conquest, and remove the middle men that stand between us and China."


################################## ZUN - Shared Missions ##################################
zun_forward_title: "Beyond the Horizon"
zun_forward_desc: "With the unification of Afghanistan we are left with the question of what to do next. Many look beyond the horizon towards Persia, eyeing its wealth and resources, and looking to spread the light of Zun to their heretical lands. Others suggest, due to mixed cultural heritage and religions, we should go toward India, and unite our Indian kin and teach them how to praise the sun."
zun_fleet_title: "Establish The Navy"
zun_fleet_desc: "With our firmly established control over Makran, we've left our secluded mountain home and opened our ports to traders and goods from all over the world. Alas, this openess comes with both danger and opportunity. Foreign influence: primarily from the Arab and Islamic merchants of the West that we once fought so hard to defend our home from, now creeps in and attempts to subvert the Zun's will. While on the other hand, we have benefited from this exchange, as luxury goods only found through the mountain passes of the Silk Road route in Zabulistan now flow far East and West, bringing unseen wealth to our realm. In order to ensure the safety of our merchants, as well as repel any naval invasions, we must make a dedicated investment in the construction of a navy."
zun_caravans_title: "Expand The Caravan Trade"
zun_caravans_desc: "Caravans are the lifeblood of trade in our empire. They are the ones who brave the dangers of bandits and rough terrain to bring goods to market. We must invest in the expansion of the caravan trade, and ensure that our merchants have access to the wealth and resources of this vast and diverse land."
zun_rebuild_zamindawar_title: "City of the Justice-giver"
zun_rebuild_zamindawar_desc: "Zamindawar was once home to the greatest shrine of Zun and it was the seat of our power until its destruction at the hands of the heathen menace. Today, we will rectify this mistake and restore the Great City of the Justice-Giver, rebuilding the shrine once more to show our gratitude to Zun for his guidance in these trying times."
zun_afghan_silk_title: "Afghani Silk"
zun_afghan_silk_desc: "While our economic power is increasing by the day, much of Afghanistan remains poor and produces only meager goods. Our next step in Afghan development should be to improve this situation in our outer provinces and sponsor large scale production enterprises in order to spur economic growth in these lands."
zun_merchant_guilds_title: "The Merchants Guilds"
zun_merchant_guilds_desc: "As our empire grows, so does the mercantile class which is now composed of a diverse array of merchants, magnates, and local traders from every corner of the nation. We should take time to organize and support these merchant guilds to propel our economic development."
zun_architecture_title: "Architectural Expansion"
zun_architecture_desc: "Our lands may be rich in trade and resources, but it is poor and undeveloped. This will not do, and we should begin the process of improving the infrastructure and wealth of our realm. If we are to take our place amongst the other great powers, we must develop our own lands!"
zun_irrigation_title: "Expand Irrigation"
zun_irrigation_desc: "The irrigation networks in the basin are lacking. It would be quite easy for a drought to destroy what little agriculture we have. We must expand our infrastructure in the region if we are to sustain our kingdoms for ages to come."
zun_urbanization_title: "Urbanise the Country"
zun_urbanization_desc: "In eons past we have been known as the Land of Ten Thousand Cities but, in reality the vast majority of our realm is unsuitable for large scale urbanization due to its harsh mountains and hot deserts. If we are to keep up with our more geographically gifted neighbors, large scale infrastructure and urbanization efforts must take place. This will be a massive undertaking, involving both our best and brightest minds in the realm, as well as funding and support from our now blossoming merchant class."
zun_labor_faith_title: "Work as Worship"
zun_labor_faith_desc: "In order to tackle the monumental effort that is required to pursue economic modernization, we must conscript the population as laborers. While we would rather not have to do this, they must do it in the name of Zun, for the survival of our nation relies on our economic independence."
zun_house_of_wisdom_title: "Fund Houses of Wisdom"
zun_house_of_wisdom_desc: "An intellecutal revolution is occuring within our nation, as universities, informally known as houses of wisdom, are popping up across the nation spreading Western knowledge and new forms of philosophy. Primarily religious institutions, the bring us new intepretations of Zun's will that we can leverage in pursuit of our national interests and with such power in hands, it would be anything but unwise to not fund these institutions."
zun_industrial_ambition_title: "Industrial Ambition"
zun_industrial_ambition_desc: "The winds of change sweep through the world, and countries from Europe to China are begining to undertake massive societal changes, moving from agrarian socities to manufacturing based ones. Afghanistan will be no different, the time has come to step into this new age as a world power!"
zun_renaissance_title: "Afghani Renaissance"
zun_renaissance_desc: "Across the world, the city-states of Italy have had the bright idea of returning to their ancient glory, when still their head Rome made a worthy rival. If their puny palaces can withstand the glory of artists known all over the globe, wouldn't the same effect apply ten-thousandfold on the magnitude of our state, just as rich in history and culture?"
zun_tribal_loyalty_title: "Secure Tribal Loyalty"
zun_tribal_loyalty_desc: "Before we expanded into the empire we are today, our nation operated on a decentralized federal structure based on alliances with local tribes and dynasties. If we are to continue into the future, especially with how diverse our nation has grown, this system can be applied across the realm to ensure the loyalty of the various different interest groups."
zun_cement_bactrian_script_title: "Codify Bactrian Script"
zun_cement_bactrian_script_desc: "Bactrian has been the lingua franca of Afghanistan for some time, but now myriad languages and dialects occupy the sectors of adminstration and commerce. In order to streamline the functions of the state, and begun to form a national identity, codifying the Bactrian Script is crucial. We should work quickly to make it standard in the bureacracy, education, and other facets of the state."
zun_educate_masses_title: "Educate The Masses"
zun_educate_masses_desc: "There is no honour in ruling over a mass of peasants and ignorant degenerates, and our enlightened state can afford to pay for buildings fit to raise every Zunbil into a potential great priest, diplomat or general."
zun_modern_government_title: "Modernized Government"
zun_modern_government_desc: "Our state must look to make its administration as efficient as possible, no longer relying on hearsay from listless delegates but making use of state-of-the-art facilities across the entire empire."
zun_patronize_arts_sciences_title: "Patronize the Humanities"
zun_patronize_arts_sciences_desc: "Our neighbourhood, the Steppes to the north and the sands of Arabia to the south, is known for great conquerors, but not as much for great scientists and patrons. Our leverage lies in the technological and cultural advantages our government prides itself on, and we must make use of it."
zun_strength_clergy_title: "Stregthen the Clergy"
zun_strength_clergy_desc: "Having expanded from a small group of followers and clergymen, we now find ourselves lacking religious control and authority over a majority of subjects. In order to correct this wrong before it is too late, we must invest heavily into the expansion and development of a strong religious establishment, spreading the faith of Zun and enforcing his will."
zun_religious_syncretism_title: "Religious Syncretism"
zun_religious_syncretism_desc: "Our empire is a land of many faiths, often times leading to complex relations between the various religious groups and our bureaucracy. We have always been tolerant towards those that do not attempt to enforce their faith upon us, but we must do what we can to bring non-believers to the light of Zun. A flexible policy of religious tolerance and syncretism, granting most faiths a level of equal treatment and exclusion from persecution for their beliefs, is crucial to streamlining the adminstration of the land."
zun_sah_bahar_title: "Temple of The King"
zun_sah_bahar_desc: "The Temple of The King is an ancient Zun temple located in the heart of our empire. It is a place of great spiritual significance, and it is essential that we invest in its restoration and upkeep. The temple will serve as a beacon of faith for our people, and a symbol of our legitimacy as the true rulers of Persia and India."
zun_warriors_of_zhun_title: "Warriors of Zun"
zun_warriors_of_zhun_desc: "In order to prepare for the upcoming struggle against the heathen and heretics that surround us, we call upon our devotees from across the land to rally around our banner. For invaders, heathens, and heretics will know the fury of Zun when our righteous warriors arrive on the battle field!"
zun_military_doctrine_title: "Modernise the Army Doctrine" 
zun_military_doctrine_desc: "Warfare is changing, gone are the days of pikes and swords. Today warfare is fought with guns and cannons that blast your enemies away. We need to follow these new tactics to get ahead of our neighbours." 
zun_gunpowder_empire_title: "A Gunpowder Empire" 
zun_gunpowder_empire_desc: "Gunpowder has forever changed how war is fought, and we happen to be right in the middle of gunpowder production. We can use this to our advantage, and create larger and better artillery to dominate the battlefield. We will level mountains and send bits of our enemies sky high."
zun_adopt_cataphracts_title: "Adopt Cataphracts"
zun_adopt_cataphracts_desc: "The cataphracts are our elite cavalry units, enveloped in unpierceable suits of armor; they have defended Persia time and time again against Rome, and now they shall serve our empire's needs in battle once again."
zun_war_elephants_title: "Reintroduce War Elephants"
zun_war_elephants_desc: "Our army's efficacy has reached new heights. Intelligence, boldness, power and determination - our armies are known for these traits, led now by generals with decades of experience, fashioned into hordes of fearsome Cataphracts and brutal infantry. With this restored might, it is only fitting that we restore yet another pillar of our fallen legacy - the dreaded war elephant. The bones of our enemies shall be pounded to dust beneath their might!"
zun_revive_immortals_title: "Revive the Immortals"
zun_revive_immortals_desc: "Our proud history has been muddied and diluted over time. Legends stand out however - paramount among them, that of the Immortals. Recalled by ancient Persian and Roman scholars alike, the Immortals were fierce heavy infantry of great standing, numbering 10,000 at any given time, no more, no less. In service, they guarded not only our ruler, but the empire as a whole. With our military might and burgeoning empire, it seems right that we revive this legend and make our enemies cower!"
zun_mongol_tactics_title: "Adopt Mongol Tactics"
zun_mongol_tactics_desc: "A wise man once recounted that we must learn from our enemies - especially those triumphant. The fearsome Mongol ways harken back to those of old, of the Parthians and the steppe warriors of before. We must concede and forget our pride just this once - learn where we went wrong so that we must not fall again. Saddle up!"
zun_mysore_rockets_title: "The Mysore Rockets"
zun_mysore_rockets_desc: "In South India, our Vassal in the Mysore region has developed a new kind of artillery, known as the Mysore rockets. These rockets are made of bamboo and iron, and are capable of causing massive damage to enemy formations. Light and portable, being able to be fire from both horseback and foot soldiers, it would be unwise to ignore this technology as we continue our expansion into India."
zun_warrior_castes_title: "Warrior Castes"
zun_warrior_castes_desc: "Throughout the East, primarily in our Indian holdings, lies a rigid caste system that assigns the role of an entire lineage to a specific function in society. While highly restrictive in some ways, it has also produced generations of mighty warriors, primarily from the Marathas and Rajput castes. We should take advantage of this societal construct, and harness these warriors as elite soldiers in our future conflicts."

