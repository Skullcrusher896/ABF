zun_locked_0_title: "§YUnlockable Mission§!"
zun_locked_0_desc: "This mission can be unlocked by completing the §OBeyond The Horizon§! mission"
zun_locked_1_title: "§YUnlockable Mission§!"
zun_locked_1_desc: "This mission can be unlocked by completing the §OBeyond The Horizon§! mission"
