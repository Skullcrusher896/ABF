################################## Estate Privileges ##################################
ABA_znn_estate_church_sun_pilgrims: "Safe Passage for Pilgrims"
ABA_znn_estate_church_sun_pilgrims_desc: "The Cossack Szlachta represent a unique class of nobility within our nation, combining the martial traditions of the Cossacks with the political influence of the Szlachta. This privilege grants them special rights and protections, ensuring their loyalty and commitment to our realm."
ABA_ZNN_PIGRLIMS_PRIVILEGE_TT: "§GUnlocks§! the '§YSafe Passage for Pilgrims§!' [Root.GetClergyName] Estate Privilege, giving the following effects:\n§G+15.0%§! Church Power Gain Modifier\n§G+1.0%§! Missionary Strength\n§G+2.0§! Tolerance of Heretics."
unlocked_privilege_estate_church_ABA_znn_estate_church_sun_pilgrims_tt: "Has completed the 'Safe Passage for Pilgrims' Mission."
estate_rajput_land_rights_buff_revoke_tooltip: "The §YRajput Governors§! Modifier will removed from all owned provinces."
ABA_ZNN_estate_nobles_maratha_special_privilege: "Maratha Military Leadership"
ABA_ZNN_estate_nobles_maratha_special_privilege_desc: "With the control of the Maratha Council over the military affairs of our nation increased, our armies shall be forged into a force that will strike terror into the hearts of our enemies."
ABA_ZNN_MARATHAS_PRIVILEGE_TT: "§GUnlocks§! the '§YMaratha Military Leadership§!' [Root.GetNobilityName] Estate Privilege, giving the following effects:\n§G+5.0%§! Discpline and §R-10.0%§! National Tax Modifier scaling with §YLoyalty§!."
unlocked_privilege_estate_nobles_ABA_ZNN_estate_nobles_maratha_special_privilege_tt: "Has completed the 'Supremacy Over Deccan' Mission."
ABA_ZNN_estate_burghers_jains_special_privilege: "Folding In The Jains"
ABA_ZNN_estate_burghers_jains_special_privilege_desc: "The Jains are a powerful yet docile mercantile class whose wealth and influence spreads throughout much of India. While we have sidelined their role as a direct competitor to own merchants, we've slowly begun the process of integrating them directly into merchant class. While this may take time, the benefits are to be bountiful."
ABA_ZNN_BURGHERS_JAINS_PRIVILEGE_TT: "§GUnlocks§! the '§YFolding in The Jains§!' [Root.GetBurghersName] Estate Privilege, giving the following effects:\n§G+15.0%§! Trade Efficiency and §R-10.0%§! Development Cost Modifier scaling with §YLoyalty§!."
unlocked_privilege_estate_burghers_ABA_ZNN_estate_burghers_jains_special_privilege_tt: "Has completed the 'Gujarati Trade Ports' Mission."

#### Government Reforms ####
aba_znn_governmental_indo_afghan_rajputs: "Indo-Afghan Rajput Military Leadership"
aba_znn_governmental_indo_afghan_rajputs_desc: "The militant culture of the Pashtuns and other Afghani tribesmen, combined with our syncretism towards their own Solar Deities, has resulted in the flowering our a new generation of Rajputs. Having already proven themselves capable soldiers and military leaders, the new synthesis of thought stemming from a cominbation of a Afghani and Rajput tactics has led to a revolution in strategic thought, breeding a new stock of elite soldiers and even an entirely new caste in the deserts of Rajasthan. It would be wise to hand over a portion of our control to this skilled military cadre."
unlock_aba_znn_governmental_indo_afghan_rajputs_tt: "§GUnlocks§! the §YIndo-Afghan Rajput Military Leadership§! §MTier 4§! Government Reform, giving the following effects:\n\n§G+5.0%§! Army Morale Recovery Speed\n§G+5.0%§! Land Fire Damage\n§G-5.0%§! Land Fire Damaged Received\n§G+10.0%§! Rajput Land Force Limit Fraction\n\nThis reform also includes the following government mechanic:\nThe Rajput Estate Privilege '§YEnlist the Purbias§!' will give an additional §G+5.0%§! discpline to §TRajput§! Regiments."
unlock_privilege_estate_burghers_tropical_nation_tt: "§GUnlocks§! the §YTropical City Planning§! [Root.GetBurghersName] Estate Privilege, granting §G-5.0%§! Local Development Cost and §G+10§! Global Settler Increase in all §YTropical§! provinces."
aba_znn_religious_syncretism_reform: "Zunist-Eastern Religious Syncretism"
aba_znn_religious_syncretism_reform_desc: "While our courts and our martial leaders have maintained a mixed militant and religious dogma towards the faiths of the West, we have managed to find ideologically and theologically peace with those of the East. Having followed them for centuries before we saw the light of Zun, and pulling pieces from each in the formation of an organized religion, we have found common ground on certain subjects that have easied our efforts to adminster these newly conquered lands. Let us continue this policy of syncretism, for the good of the nation!"
unlock_aba_znn_religious_syncretism_reform_tt: "§GUnlocks§! the §YZunist-Eastern Religious Syncretism§! §MTier 5§! Government Reform, giving the following effects:\n\n§G+1§! Tolerance of Heathens and Max Tolerance Capacity\n§G+1§! Tolerance of Heretics and Max Tolerance Capacity\n§Y+5.0%§! clergy Influence Modifier\n\nThis reform also includes the following government mechanics:\n§YTemples§! and §YCathedrals§! give the province §G+33.0%§! Local Tax Modifier and §G-2.00§! Local Unrest.\n\nThe Estate Privilege '§YEnforced Interfaith Dialog§!' no longer decreases Clergy Loyalty nor Max Absolutism."
aba_znn_tribal_loyalties_reform: "Secured Tribal Loyalties"
aba_znn_tribal_loyalties_reform_desc: "When we previously ruled a much larger swath of land, we succesfully subdued and rallied the loyalty of tribes through a decentralized quasi-federal network of tribal alliances and tributaries. We must revive this informal style of governance in order to ensure we have enough manpower for campaigns to come, and ease the integration of new lands."
unlock_aba_znn_tribal_loyalties_reform_tt: "§GUnlocks§! the §YSecured Tribal Loyalties§! §MTier 2§! Government Reform, giving the following effects:\n\n§G+10.0%§! Movement Speed\n§G+10.0%§! Land Force Limit Modifier\n§G+10.0%§! Manpower Modifier in Primary Culture Group Provinces.\n§Y+15.0%§! Nobility Influence Modifier."
aba_znn_persinate_radiant_state_reform: "Radiant Persinate State"
aba_znn_persinate_radiant_state_reform_desc: "Through the divine guidance of the chosen priesthood of Zun, the state shall be a beacon of wisdom and justice. The Radiance of Zun shall shine to all corners of the world, and peace and prosperity shall abound. Through Zun's divine wisdom and the benevolent warmth of his glow, we have been guided to incorporate elements of Persianate and Turkic adminstration into our own, so his light may shine brighter on those farther away from our heartland."
unlock_aba_znn_persinate_radiant_state_reform_tt: "§GEmpowers§! the §YRadiant State§! §MTier 1§! Government Reform, transforming it into the §YRadiant Persianate State§! §MTier 1§! Government Reform, giving the following additional effects:\n\n§G+1§! Tolerance of The True Faith\n§G+5.0%§! Church Power Gain Modifier\n§Y+10.0%§! Governing Capacity Modifier\n\nThis reform also includes the following additional government mechanics:\nCan place §YPashas§!\n\n§YPashas§! now give §G+20.0%§! Local Tax Modifier for provinces of foreign culture groups."

