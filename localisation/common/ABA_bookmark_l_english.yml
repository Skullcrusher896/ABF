BOOK_ABA_FLAVOR_DESC: "The newest update of ABF brings you back to the Wild Fields of Southern Ukraine, where a man is reborn through fire, sword, and saddle. The Hetmanate/Zaporizhia has received a massive new update, bringing to life the vibrant culture of the Cossack Host and the tense political landscape it inhabits. Will you preserve the Cossack way of life, and the freedom it holds so dear? Or fall to the temptation of power, coerced by the alluring whispers of despotism and absolutism?  Many nations have new cultures in mechanics in ABF some being: Wendia, Germany, Japan, Ruthenia, and many more!"